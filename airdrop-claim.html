<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoTax | Claim Airdrop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: radial-gradient(ellipse at top, #0f172a 0%, #1e1b4b 50%, #0a0a1a 100%); background-attachment: fixed; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border-radius: 28px; border: 1px solid rgba(139, 92, 246, 0.2); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(139, 92, 246, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .btn-primary { background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); border-radius: 40px; padding: 12px 28px; font-weight: 600; color: white; transition: all 0.3s ease; cursor: pointer; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5); }
        .gradient-text { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/50 backdrop-blur-xl border-b border-white/10">
        <div class="container mx-auto px-5 sm:px-8 py-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <span class="text-2xl sm:text-3xl animate-pulse">💰</span>
                    <span class="text-white font-bold text-xl sm:text-2xl tracking-tight">CryptoTax</span>
                    <span class="hidden sm:inline-flex text-xs bg-purple-500/20 text-purple-300 px-2 py-1 rounded-full ml-2">BETA</span>
                </div>
                <div class="flex items-center gap-2 sm:gap-4">
                    <a href="index.html" class="text-gray-300 hover:text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg hover:bg-white/5">Home</a>
                    <a href="dashboard.html" class="text-gray-300 hover:text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg hover:bg-white/5">Dashboard</a>
                    <a href="tax-estimator.html" class="text-gray-300 hover:text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg hover:bg-white/5">Estimator</a>
                    <a href="airdrop-claim.html" class="text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg bg-purple-600/20">Claim</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-5 pt-28">
        <div class="max-w-md mx-auto glass-card p-8 text-center">
            <div class="w-20 h-20 bg-purple-500/20 rounded-2xl flex items-center justify-center text-4xl mx-auto mb-4">🎁</div>
            <h1 class="text-3xl font-bold mb-2">Claim Free Tokens</h1>
            <p class="text-gray-400 mb-6">Get 10 MFC tokens to test the tax estimator</p>
            
            <div id="walletStatus">
                <button id="connectBtn" class="btn-primary w-full">🔌 Connect Wallet</button>
            </div>
            
            <div id="claimArea" class="hidden mt-6">
                <button id="claimBtn" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-3 rounded-xl w-full transition">🎁 Claim 10 MFC</button>
                <p id="claimStatus" class="text-sm text-gray-400 mt-3"></p>
            </div>
        </div>
    </div>

    <script>
        let signer, walletAddress;
        
        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) return alert('Install MetaMask!');
            const provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            walletAddress = await signer.getAddress();
            document.getElementById('connectBtn').innerHTML = `✅ Connected: ${walletAddress.slice(0,6)}...`;
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('claimArea').classList.remove('hidden');
        };
        
        document.getElementById('claimBtn').onclick = async () => {
            document.getElementById('claimBtn').disabled = true;
            document.getElementById('claimStatus').innerHTML = 'Claiming...';
            alert('On testnet, tokens are claimed via the token owner. Contact admin or use faucet.');
            document.getElementById('claimStatus').innerHTML = 'Manual claim: Contact support';
            document.getElementById('claimBtn').disabled = false;
        };
    </script>
</body>
</html>
