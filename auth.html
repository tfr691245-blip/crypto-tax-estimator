<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;background:#0A0C15;color:#E8EDF5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        body.light{background:#F5F7FF;color:#1A1F36}
        .container{width:100%;max-width:500px;margin:0 auto}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#0D0F17;border-radius:24px;margin-bottom:32px}
        body.light .navbar{background:#fff}
        .back-btn{width:40px;height:40px;background:rgba(247,147,26,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#F7931A;text-decoration:none}
        .logo{display:flex;align-items:center;gap:12px;cursor:pointer}
        .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px}
        .logo-text h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,#F7931A,#FFD166);-webkit-background-clip:text;background-clip:text;color:transparent}
        .theme-toggle{width:40px;height:40px;background:rgba(247,147,26,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .auth-card{background:#0D0F17;border-radius:32px;padding:40px;border:1px solid rgba(247,147,26,0.15)}
        body.light .auth-card{background:#fff}
        .auth-header{text-align:center;margin-bottom:32px}
        .auth-header h2{font-size:28px;font-weight:700;background:linear-gradient(135deg,#F7931A,#FFD166);-webkit-background-clip:text;background-clip:text;color:transparent}
        .mode-toggle{display:flex;gap:12px;margin-bottom:32px;background:#0A0C15;border-radius:60px;padding:4px}
        body.light .mode-toggle{background:#f0f0f0}
        .mode-btn{flex:1;padding:12px;border-radius:60px;font-weight:600;cursor:pointer;background:transparent;border:none;color:#8E94B3}
        .mode-btn.active{background:linear-gradient(135deg,#F7931A,#FF6B00);color:#05070A}
        .form-group{margin-bottom:20px;position:relative}
        .form-group input{width:100%;padding:16px 20px;background:#0A0C15;border:1px solid rgba(247,147,26,0.2);border-radius:20px;color:#E8EDF5;font-size:16px;font-family:'Space Grotesk',monospace}
        body.light .form-group input{background:#f5f7ff;color:#1A1F36}
        .form-group input:focus{border-color:#F7931A;outline:none}
        .form-group i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#F7931A;cursor:pointer}
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#F7931A,#FF6B00);border:none;border-radius:60px;font-weight:700;cursor:pointer;margin-top:10px;color:#05070A}
        .submit-btn:disabled{opacity:0.6;cursor:not-allowed}
        .error-message,.success-message{padding:12px;border-radius:16px;font-size:13px;margin-bottom:20px;display:none}
        .error-message{background:rgba(255,68,68,0.1);border-left:3px solid #FF4444;color:#FF6B6B}
        .success-message{background:rgba(76,175,80,0.1);border-left:3px solid #4CAF50;color:#4CAF50}
        .hidden{display:none!important}
        .loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,0.2);border-radius:50%;border-top-color:#05070A;animation:spin 0.6s linear infinite;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .forgot-password{text-align:right;margin-bottom:15px}
        .forgot-password a{color:#F7931A;font-size:13px;cursor:pointer;text-decoration:none}
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="logo" onclick="location.href='index.html'">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <div class="logo-text"><h1>CRYPTOTAX</h1></div>
        </div>
        <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
    </div>

    <div class="auth-card">
        <div class="auth-header"><h2>Welcome Back</h2></div>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="signinModeBtn">Sign In</button>
            <button class="mode-btn" id="signupModeBtn">Sign Up</button>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="signinForm">
            <div class="form-group"><input type="email" id="signinEmail" placeholder="Email address" required><i class="fas fa-envelope"></i></div>
            <div class="form-group"><input type="password" id="signinPassword" placeholder="Password" required><i class="fas fa-eye" onclick="togglePassword('signinPassword',this)"></i></div>
            <div class="forgot-password"><a href="#" id="forgotPasswordLink">Forgot password?</a></div>
            <button type="submit" id="signinBtn" class="submit-btn">Sign In</button>
        </form>
        
        <form id="signupForm" class="hidden">
            <div class="form-group"><input type="email" id="signupEmail" placeholder="Email address" required><i class="fas fa-envelope"></i></div>
            <div class="form-group"><input type="password" id="signupPassword" placeholder="Password" required><i class="fas fa-eye" onclick="togglePassword('signupPassword',this)"></i></div>
            <div class="form-group"><input type="password" id="signupConfirmPassword" placeholder="Confirm password" required><i class="fas fa-check-circle"></i></div>
            <button type="submit" id="signupBtn" class="submit-btn">Create Account</button>
        </form>
        
        <div class="switch-mode" style="text-align:center; margin-top:20px;">
            <span id="switchText">Don't have an account? <span id="switchBtn" style="color:#F7931A; cursor:pointer;">Sign Up</span></span>
        </div>
    </div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const EDGE_FUNCTION_URL = 'https://ihtazaanlobowggooghy.supabase.co/functions/v1/check-user';

    // Theme Toggle
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') document.body.classList.add('light');
    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };

    window.togglePassword = function(fieldId, icon) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    };

    // Mode Toggle
    const signinModeBtn = document.getElementById('signinModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const switchText = document.getElementById('switchText');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');

    function setMode(mode) {
        if (mode === 'signin') {
            signinModeBtn.classList.add('active');
            signupModeBtn.classList.remove('active');
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            switchText.innerHTML = 'Don\'t have an account? <span id="switchBtn" style="color:#F7931A; cursor:pointer;">Sign Up</span>';
            const btn = document.getElementById('switchBtn');
            if (btn) btn.onclick = () => setMode('signup');
        } else {
            signupModeBtn.classList.add('active');
            signinModeBtn.classList.remove('active');
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            switchText.innerHTML = 'Already have an account? <span id="switchBtn" style="color:#F7931A; cursor:pointer;">Sign In</span>';
            const btn = document.getElementById('switchBtn');
            if (btn) btn.onclick = () => setMode('signin');
        }
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
    }

    signinModeBtn.onclick = () => setMode('signin');
    signupModeBtn.onclick = () => setMode('signup');
    setMode('signin');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        setTimeout(() => successDiv.style.display = 'none', 5000);
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        } else {
            btn.disabled = false;
            btn.innerHTML = btnId === 'signinBtn' ? 'Sign In' : 'Create Account';
        }
    }

    // CHECK USER STATUS VIA EDGE FUNCTION
    async function checkUserStatus(email) {
        try {
            const response = await fetch(EDGE_FUNCTION_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const result = await response.json();
            return result;
        } catch (error) {
            return { exists: false, confirmed: false };
        }
    }

    // RESEND CONFIRMATION EMAIL
    async function resendConfirmationEmail(email) {
        const redirectUrl = window.location.origin + '/confirm.html';
        const { error } = await sb.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: redirectUrl }
        });
        if (error) throw error;
    }

    // Forgot Password
    document.getElementById('forgotPasswordLink').onclick = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        if (!email) return showError('Please enter your email address');
        const redirectUrl = window.location.origin + '/reset-password.html';
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
        error ? showError(error.message) : showSuccess('Password reset link sent to your email!');
    };

    // SIGN UP - YOUR 2 INSTRUCTIONS
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value.trim();
        const pwd = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;
        
        if (!email || !pwd) return showError('Please fill in all fields');
        if (pwd !== confirm) return showError('Passwords do not match');
        if (pwd.length < 6) return showError('Password must be at least 6 characters');
        
        setLoading('signupBtn', true);
        
        // STEP 1: Check if email exists using Edge Function
        const userStatus = await checkUserStatus(email);
        
        if (userStatus.exists) {
            setLoading('signupBtn', false);
            
            if (userStatus.confirmed) {
                // INSTRUCTION 1: Email is CONFIRMED → Show "Account already exists"
                showError('Account already exists with this email. Please sign in instead.');
            } else {
                // INSTRUCTION 2: Email exists but UNCONFIRMED → Resend confirmation
                try {
                    await resendConfirmationEmail(email);
                    showSuccess('Verification email resent! Please check your inbox.');
                } catch (err) {
                    showError('Unable to resend verification. Please try again.');
                }
            }
            return;
        }
        
        // STEP 2: New email → Create account and send confirmation
        const redirectUrl = window.location.origin + '/confirm.html';
        const { data, error } = await sb.auth.signUp({ 
            email, 
            password: pwd, 
            options: { emailRedirectTo: redirectUrl } 
        });
        
        setLoading('signupBtn', false);
        
        if (error) {
            showError(error.message);
        } else if (data && data.user) {
            // INSTRUCTION 2: New email → Send confirmation
            showSuccess('Confirmation email sent! Please check your inbox to verify your email.');
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirmPassword').value = '';
            setTimeout(() => setMode('signin'), 4000);
        }
    };

    // Sign In
    document.getElementById('signinForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        const pwd = document.getElementById('signinPassword').value;
        if (!email || !pwd) return showError('Please enter email and password');
        
        setLoading('signinBtn', true);
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
        setLoading('signinBtn', false);
        
        if (error) {
            if (error.message.includes('Email not confirmed')) {
                showError('Please confirm your email first. Check your inbox.');
            } else if (error.message.includes('Invalid login credentials')) {
                showError('Invalid email or password');
            } else {
                showError(error.message);
            }
            return;
        }
        
        if (data.user) {
            localStorage.setItem('cryptotax_current_user', JSON.stringify({
                id: data.user.id,
                email: data.user.email,
                name: data.user.email.split('@')[0]
            }));
            showSuccess('Signed in! Redirecting...');
            setTimeout(() => window.location.href = window.location.origin + '/dashboard.html', 1500);
        }
    };

    // Check existing session
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            window.location.href = window.location.origin + '/dashboard.html';
        }
    });
})();
</script>
</body>
</html>
