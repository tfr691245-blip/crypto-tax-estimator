<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Authentication Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0A0C15;
            --bg-secondary: #0D0F17;
            --bg-card: #0D0F17;
            --text-primary: #E8EDF5;
            --text-secondary: #8E94B3;
            --text-muted: #6C729B;
            --border-color: #1A1E2C;
            --border-light: rgba(247, 147, 26, 0.15);
            --accent: #F7931A;
            --accent-gradient: linear-gradient(135deg, #F7931A 0%, #E07C0A 100%);
            --shadow: 0 8px 20px rgba(247, 147, 26, 0.25);
        }

        body.light {
            --bg-primary: #F5F7FF;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --text-primary: #1A1F36;
            --text-secondary: #4A5568;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --border-light: rgba(247, 147, 26, 0.2);
        }

        html { -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body:not(.light) .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0A0C15;
        }

        body:not(.light) .bg-orb::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.12), transparent 70%);
            filter: blur(80px);
            animation: float 12s ease-in-out infinite;
        }

        @keyframes float { 0%,100% { transform: translate(0,0) scale(1); opacity: 0.5; } 50% { transform: translate(5%,5%) scale(1.1); opacity: 0.8; } }

        .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
        @media (min-width: 768px) { .container { padding: 24px; } }

        .navbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 32px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        @media (min-width: 768px) {
            .navbar { flex-direction: row; justify-content: space-between; text-align: left; padding: 16px 24px; margin-bottom: 48px; }
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(247, 147, 26, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent);
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(247, 147, 26, 0.2);
            transform: scale(1.05);
        }

        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { width: 44px; height: 44px; background: var(--accent-gradient); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--shadow); }
        .logo-text h1 { font-size: 24px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 11px; color: var(--accent); letter-spacing: 1px; font-weight: 500; }

        .nav-right { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; width: 100%; flex-wrap: wrap; }
        @media (min-width: 768px) { .nav-right { margin-top: 0; width: auto; } }

        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-link:hover { background: rgba(247, 147, 26, 0.1); color: var(--accent); }
        .nav-link.active { background: var(--accent-gradient); color: #05070A; box-shadow: var(--shadow); }

        .theme-toggle {
            background: rgba(5, 7, 10, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover { transform: rotate(15deg); border-color: var(--accent); }
        .theme-toggle i { font-size: 20px; transition: transform 0.5s ease; }
        body.light .theme-toggle i { transform: rotate(360deg); }

        .auth-card {
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid var(--border-light);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-header h2 {
            font-size: 28px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .mode-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            border-radius: 60px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }

        .mode-btn {
            flex: 1;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--accent-gradient);
            color: #05070A;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: 'Space Grotesk', monospace;
            outline: none;
            transition: all 0.3s;
        }

        body.light .form-group input {
            background: rgba(0, 0, 0, 0.03);
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.1);
        }

        .form-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            color: #05070A;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 28px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-light);
        }

        .divider span {
            margin: 0 16px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1.5px solid var(--border-color);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Outfit', sans-serif;
        }

        .google-btn:hover {
            background: rgba(247, 147, 26, 0.08);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .google-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .switch-mode {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-mode span {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
        }

        .error-message, .success-message {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #FF4444;
            color: #FF6B6B;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4CAF50;
            color: #4CAF50;
        }

        .hidden { display: none !important; }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: #05070A;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="bg-orb"></div>

<div class="container">
    <div class="navbar">
        <div class="nav-left">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <div class="logo-text">
                    <h1>CRYPTOTAX</h1>
                    <p>ENTERPRISE GRADE</p>
                </div>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="tax-estimator.html" class="nav-link">Estimator</a>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your account or create a new one</p>
        </div>

        <div class="mode-toggle">
            <button class="mode-btn active" id="signinModeBtn">Sign In</button>
            <button class="mode-btn" id="signupModeBtn">Sign Up</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="signinForm">
            <div class="form-group">
                <input type="email" id="signinEmail" placeholder="Email address" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signinPassword" placeholder="Password" required>
                <i class="fas fa-eye" onclick="togglePassword('signinPassword',this)"></i>
            </div>
            <div class="forgot-password">
                <a href="#" id="forgotPasswordLink">Forgot password?</a>
            </div>
            <button type="submit" id="signinBtn" class="submit-btn">Sign In <i class="fas fa-arrow-right"></i></button>
        </form>

        <form id="signupForm" class="hidden">
            <div class="form-group">
                <input type="email" id="signupEmail" placeholder="Email address" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signupPassword" placeholder="Password" required>
                <i class="fas fa-eye" onclick="togglePassword('signupPassword',this)"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
                <i class="fas fa-check-circle"></i>
            </div>
            <button type="submit" id="signupBtn" class="submit-btn">Create Account <i class="fas fa-user-plus"></i></button>
        </form>

        <div class="divider"><span>or continue with</span></div>

        <button id="googleSignInBtn" class="google-btn">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span class="google-text">Sign in with Google</span>
        </button>

        <div class="switch-mode">
            <span id="switchText">Don't have an account? <span id="switchBtn">Sign Up</span></span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    function setTheme(t) {
        if (t === 'light') {
            document.body.classList.add('light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
            localStorage.setItem('theme', 'dark');
        }
    }
    const savedTheme = localStorage.getItem('theme');
    savedTheme === 'light' ? setTheme('light') : setTheme('dark');
    themeToggle.onclick = () => document.body.classList.contains('light') ? setTheme('dark') : setTheme('light');

    window.togglePassword = function(f, i) {
        const d = document.getElementById(f);
        if (d.type === 'password') {
            d.type = 'text';
            i.classList.remove('fa-eye');
            i.classList.add('fa-eye-slash');
        } else {
            d.type = 'password';
            i.classList.remove('fa-eye-slash');
            i.classList.add('fa-eye');
        }
    };

    const signinModeBtn = document.getElementById('signinModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const switchText = document.getElementById('switchText');

    function setMode(m) {
        if (m === 'signin') {
            signinModeBtn.classList.add('active');
            signupModeBtn.classList.remove('active');
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            switchText.innerHTML = 'Don\'t have an account? <span id="switchBtn">Sign Up</span>';
            const b = document.getElementById('switchBtn');
            if (b) b.onclick = () => setMode('signup');
        } else {
            signupModeBtn.classList.add('active');
            signinModeBtn.classList.remove('active');
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            switchText.innerHTML = 'Already have an account? <span id="switchBtn">Sign In</span>';
            const b = document.getElementById('switchBtn');
            if (b) b.onclick = () => setMode('signin');
        }
        hideMessages();
    }

    signinModeBtn.onclick = () => setMode('signin');
    signupModeBtn.onclick = () => setMode('signup');

    function showError(m) {
        const e = document.getElementById('errorMessage');
        e.textContent = m;
        e.style.display = 'block';
        setTimeout(() => e.style.display = 'none', 5000);
    }

    function showSuccess(m) {
        const e = document.getElementById('successMessage');
        e.textContent = m;
        e.style.display = 'block';
        setTimeout(() => e.style.display = 'none', 5000);
    }

    function hideMessages() {
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        } else {
            btn.disabled = false;
            if (btnId === 'signinBtn') {
                btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
            } else if (btnId === 'signupBtn') {
                btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
            }
        }
    }

    // Forgot Password
    document.getElementById('forgotPasswordLink').onclick = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        if (!email) {
            showError('Please enter your email address');
            return;
        }
        const redirectUrl = window.location.origin + '/reset-password.html';
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
        error ? showError(error.message) : showSuccess('Password reset link sent to your email!');
    };

    // RESEND CONFIRMATION EMAIL FUNCTION
    async function resendConfirmationEmail(email) {
        const redirectUrl = window.location.origin + '/confirm.html';
        const { error } = await sb.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: redirectUrl }
        });
        if (error) throw error;
    }

    // CHECK USER STATUS AND HANDLE ACCORDINGLY
    async function checkUserStatus(email) {
        try {
            // Try to sign in with dummy password to check if user exists
            const { error } = await sb.auth.signInWithPassword({ email, password: 'dummy-password-12345' });
            
            // If error is "Invalid login credentials", user EXISTS
            if (error && error.message === 'Invalid login credentials') {
                // Get the actual user to check if email is confirmed
                const { data: { user } } = await sb.auth.getUser();
                
                // Try to get user via admin API (will work with anon? no)
                // Alternative: Try to sign in with OTP to resend
                // For unconfirmed users, we can resend confirmation
                
                // We need to check if user is confirmed by trying to send OTP
                // If user is unconfirmed, OTP will resend confirmation
                const redirectUrl = window.location.origin + '/confirm.html';
                const { error: otpError } = await sb.auth.signInWithOtp({
                    email: email,
                    options: { emailRedirectTo: redirectUrl }
                });
                
                if (!otpError) {
                    // OTP sent successfully - either user exists or new signup
                    return { exists: true, confirmed: false, otpSent: true };
                }
                return { exists: true, confirmed: true, otpSent: false };
            }
            return { exists: false, confirmed: false, otpSent: false };
        } catch (e) {
            return { exists: false, confirmed: false, otpSent: false };
        }
    }

    // SIGN UP - Check if email exists and handle unconfirmed users
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value.trim();
        const pwd = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;
        
        if (!email || !pwd || !confirm) return showError('Please fill in all fields');
        if (pwd !== confirm) return showError('Passwords do not match');
        if (pwd.length < 6) return showError('Password must be at least 6 characters');
        
        setLoading('signupBtn', true);
        
        try {
            // FIRST: Try to sign up normally
            const redirectUrl = window.location.origin + '/confirm.html';
            const { data, error } = await sb.auth.signUp({ 
                email, 
                password: pwd, 
                options: { emailRedirectTo: redirectUrl } 
            });
            
            setLoading('signupBtn', false);
            
            if (error) {
                // If error is "User already registered", check if user is confirmed
                if (error.message === 'User already registered') {
                    // Try to resend confirmation email
                    const { error: resendError } = await sb.auth.signInWithOtp({
                        email: email,
                        options: { emailRedirectTo: redirectUrl }
                    });
                    
                    if (!resendError) {
                        showSuccess('Verification email resent! Please check your inbox and confirm your email.');
                    } else {
                        showError('Account already exists. Please sign in or request a password reset.');
                    }
                } else {
                    showError(error.message);
                }
                return;
            }
            
            if (data && data.user) {
                showSuccess('Confirmation email sent! Please check your inbox.');
                document.getElementById('signupEmail').value = '';
                document.getElementById('signupPassword').value = '';
                document.getElementById('signupConfirmPassword').value = '';
                setTimeout(() => setMode('signin'), 4000);
            }
        } catch (err) {
            setLoading('signupBtn', false);
            showError(err.message);
        }
    };

    // Sign In
    document.getElementById('signinForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        const pwd = document.getElementById('signinPassword').value;
        if (!email || !pwd) return showError('Please enter email and password');
        
        setLoading('signinBtn', true);
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
        setLoading('signinBtn', false);
        
        if (error) {
            if (error.message.includes('Email not confirmed')) {
                showError('Please confirm your email first. Check your inbox!');
            } else if (error.message.includes('Invalid login credentials')) {
                showError('Invalid email or password');
            } else {
                showError(error.message);
            }
            return;
        }
        
        if (data.user) {
            const user = { 
                id: data.user.id, 
                email: data.user.email, 
                name: data.user.user_metadata?.full_name || email.split('@')[0], 
                picture: data.user.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${email.split('@')[0]}` 
            };
            localStorage.setItem('cryptotax_current_user', JSON.stringify(user));
            showSuccess('Signed in! Redirecting...');
            setTimeout(() => window.location.href = window.location.origin + '/dashboard.html', 1500);
        }
    };

    // Google Sign In
    document.getElementById('googleSignInBtn').onclick = async (e) => {
        e.preventDefault();
        try {
            const redirectUrl = window.location.origin + '/dashboard.html';
            const { error } = await sb.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: redirectUrl, queryParams: { prompt: 'select_account' } } 
            });
            if (error) throw error;
        } catch (err) {
            showError(err.message);
        }
    };

    // Check existing session
    (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            const user = { 
                id: session.user.id, 
                email: session.user.email, 
                name: session.user.user_metadata?.full_name || session.user.email.split('@')[0], 
                picture: session.user.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${session.user.email.split('@')[0]}` 
            };
            localStorage.setItem('cryptotax_current_user', JSON.stringify(user));
            window.location.href = window.location.origin + '/dashboard.html';
        }
    })();
    
    setMode('signin');
})();
</script>
</body>
</html>
