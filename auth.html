<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTaxee | Authenticatiowwn Pwwortal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        *{-webkit-tap-highlight-color:transparent}
        
        body {
            font-family:'Outfit','Space Grotesk',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0A0C15;
            transition:background .3s ease;
            position:relative;
            padding:20px;
        }
        
        body.light { background:#F5F7FF; }
        
        /* Top Bar - Universal */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: transparent;
        }
        
        .back-btn, .theme-toggle {
            width: 48px;
            height: 48px;
            background: rgba(13, 15, 23, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(247, 147, 26, 0.3);
            color: #F7931A;
            text-decoration: none;
            font-size: 22px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover, .theme-toggle:hover {
            transform: scale(1.05);
            border-color: #F7931A;
        }
        
        body.light .back-btn, body.light .theme-toggle {
            background: rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 550px) {
            .top-bar { padding: 16px 20px; }
            .back-btn, .theme-toggle { width: 42px; height: 42px; font-size: 18px; }
        }
        
        .auth-wrapper {
            width:100%;
            max-width:1400px;
            margin:0 auto;
        }
        
        .auth-card {
            background:rgba(13,15,23,.85);
            backdrop-filter:blur(20px);
            border-radius:48px;
            padding:48px 56px;
            border:1px solid rgba(247,147,26,.25);
            width:100%;
            transition:all .4s ease;
        }
        
        body.light .auth-card { background:rgba(255,255,255,.95); }
        
        .auth-content {
            display:flex;
            gap:60px;
            flex-wrap:wrap;
        }
        
        .auth-left {
            flex:1;
            min-width:280px;
        }
        
        .auth-right {
            flex:1;
            min-width:280px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }
        
        @media (max-width: 900px) {
            .auth-content { flex-direction:column; gap:40px; }
            .auth-card { padding:32px 28px; }
        }
        
        .logo-icon {
            width:75px;
            height:75px;
            background:linear-gradient(135deg,#F7931A,#FF6B00);
            border-radius:24px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:36px;
            margin-bottom:24px;
            box-shadow:0 15px 35px rgba(247,147,26,.3);
            cursor:pointer;
        }
        
        .logo h2 {
            font-size:32px;
            font-weight:800;
            background:linear-gradient(135deg,#F7931A,#FFD166);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            margin-bottom:12px;
        }
        
        .logo p {
            font-size:14px;
            color:#8E94B3;
            margin-bottom:32px;
        }
        
        .mode-toggle {
            display:flex;
            gap:16px;
            margin-bottom:32px;
            background:rgba(0,0,0,.2);
            border-radius:60px;
            padding:6px;
        }
        
        .mode-btn {
            flex:1;
            padding:14px 24px;
            border-radius:60px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            background:transparent;
            border:none;
            color:#6C729B;
            font-family:'Outfit',sans-serif;
            transition:all .3s;
        }
        
        .mode-btn.active {
            background:linear-gradient(135deg,#F7931A,#FF6B00);
            color:#05070A;
            box-shadow:0 2px 8px rgba(247,147,26,.3);
        }
        
        .form-group {
            margin-bottom:24px;
            position:relative;
        }
        
        .form-group input {
            width:100%;
            padding:18px 24px;
            background:rgba(5,7,10,.6);
            border:1.5px solid rgba(247,147,26,.15);
            border-radius:24px;
            font-size:16px;
            color:#E8EDF5;
            font-family:'Space Grotesk',monospace;
            outline:none;
            transition:all .3s;
        }
        
        body.light .form-group input {
            background:rgba(0,0,0,.03);
            color:#1A1F36;
        }
        
        .form-group input:focus {
            border-color:#F7931A;
            box-shadow:0 0 0 3px rgba(247,147,26,.1);
        }
        
        .form-group i {
            position:absolute;
            right:20px;
            top:50%;
            transform:translateY(-50%);
            color:#F7931A;
            font-size:20px;
            cursor:pointer;
        }
        
        .forgot-password {
            text-align:right;
            margin-bottom:32px;
        }
        
        .forgot-password a {
            color:#F7931A;
            font-size:13px;
            cursor:pointer;
            text-decoration:none;
        }
        
        .submit-btn {
            width:100%;
            padding:18px;
            background:linear-gradient(135deg,#F7931A,#FF6B00);
            border:none;
            border-radius:60px;
            font-size:18px;
            font-weight:700;
            color:#05070A;
            cursor:pointer;
            transition:all .3s;
            margin-top:8px;
        }
        
        .submit-btn:hover {
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(247,147,26,.3);
        }
        
        .submit-btn:active { transform:scale(.98); }
        .submit-btn:disabled { opacity:0.6; cursor:not-allowed; }
        
        .divider {
            display:flex;
            align-items:center;
            text-align:center;
            margin:32px 0;
            color:#6C729B;
            font-size:13px;
        }
        
        .divider::before,.divider::after {
            content:'';
            flex:1;
            border-bottom:1px solid rgba(247,147,26,.15);
        }
        
        .divider span { margin:0 20px; }
        
        .google-btn {
            width:100%;
            padding:16px;
            background:rgba(255,255,255,.03);
            border:1.5px solid rgba(247,147,26,.25);
            border-radius:60px;
            cursor:pointer;
            transition:all .3s;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            font-family:'Outfit',sans-serif;
        }
        
        body.light .google-btn { background:rgba(0,0,0,.02); }
        
        .google-btn:hover {
            background:rgba(247,147,26,.08);
            border-color:#F7931A;
            transform:translateY(-2px);
        }
        
        .google-text {
            font-size:16px;
            font-weight:600;
            color:#E8EDF5;
        }
        
        body.light .google-text { color:#1A1F36; }
        
        .switch-mode {
            text-align:center;
            margin-top:32px;
            font-size:14px;
            color:#6C729B;
        }
        
        .switch-mode span { color:#F7931A; cursor:pointer; font-weight:600; }
        
        .error-message,.success-message {
            padding:14px 18px;
            border-radius:20px;
            font-size:13px;
            margin-bottom:24px;
            display:none;
            animation:slideIn .3s;
        }
        
        @keyframes slideIn {
            from { opacity:0; transform:translateY(-10px); }
            to { opacity:1; transform:translateY(0); }
        }
        
        .error-message {
            background:rgba(255,68,68,.1);
            border-left:3px solid #FF4444;
            color:#FF6B6B;
        }
        
        .success-message {
            background:rgba(76,175,80,.1);
            border-left:3px solid #4CAF50;
            color:#4CAF50;
        }
        
        .hidden { display:none!important; }
        
        .bg-orb {
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            z-index:-1;
        }
        
        body:not(.light) .bg-orb::before {
            content:'';
            position:absolute;
            top:20%;
            left:20%;
            width:60%;
            height:60%;
            background:radial-gradient(circle,rgba(247,147,26,.12),transparent 70%);
            filter:blur(80px);
            animation:float 12s ease-in-out infinite;
        }
        
        @keyframes float {
            0%,100% { transform:translate(0,0) scale(1); opacity:.5; }
            50% { transform:translate(5%,5%) scale(1.1); opacity:.8; }
        }
        
        .loading-spinner {
            display:inline-block;
            width:18px;
            height:18px;
            border:2px solid rgba(0,0,0,0.2);
            border-radius:50%;
            border-top-color:#05070A;
            animation:spin .6s linear infinite;
            margin-right:8px;
        }
        
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="bg-orb"></div>

<!-- TOP BAR - Same on all pages -->
<div class="top-bar">
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-content">
            <div class="auth-left">
                <div class="logo" onclick="location.href='index.html'">
                    <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                    <h2>CRYPTOTAX</h2>
                    <p>Enterprise Authentication Portal</p>
                </div>
                
                <div class="mode-toggle">
                    <button class="mode-btn active" id="signinModeBtn">Sign In</button>
                    <button class="mode-btn" id="signupModeBtn">Sign Up</button>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <form id="signinForm">
                    <div class="form-group">
                        <input type="email" id="signinEmail" placeholder="Email address" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signinPassword" placeholder="Password" required>
                        <i class="fas fa-eye" onclick="togglePassword('signinPassword',this)"></i>
                    </div>
                    <div class="forgot-password">
                        <a href="#" id="forgotPasswordLink">Forgot password?</a>
                    </div>
                    <button type="submit" id="signinBtn" class="submit-btn">Sign In <i class="fas fa-arrow-right"></i></button>
                </form>
                
                <form id="signupForm" class="hidden">
                    <div class="form-group">
                        <input type="email" id="signupEmail" placeholder="Email address" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signupPassword" placeholder="Password" required>
                        <i class="fas fa-eye" onclick="togglePassword('signupPassword',this)"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <button type="submit" id="signupBtn" class="submit-btn">Create Account <i class="fas fa-user-plus"></i></button>
                </form>
            </div>
            
            <div class="auth-right">
                <div class="divider"><span>or continue with</span></div>
                <button id="googleSignInBtn" class="google-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    <span class="google-text" id="googleBtnText">Sign in with Google</span>
                </button>
                
                <div class="switch-mode">
                    <span id="switchText">Don't have an account? <span id="switchBtn">Sign Up</span></span>
                </div>
                
                <div style="margin-top: 40px; padding: 20px; background: rgba(247,147,26,0.05); border-radius: 24px; text-align: center;">
                    <i class="fas fa-shield-alt" style="color: #F7931A; font-size: 24px; margin-bottom: 12px;"></i>
                    <p style="font-size: 12px; color: #8E94B3;">Your data is secured with enterprise-grade encryption</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    function setTheme(t) {
        if (t === 'light') {
            document.body.classList.add('light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
            localStorage.setItem('theme', 'dark');
        }
    }
    const savedTheme = localStorage.getItem('theme');
    savedTheme === 'light' ? setTheme('light') : setTheme('dark');
    themeToggle.onclick = () => document.body.classList.contains('light') ? setTheme('dark') : setTheme('light');

    window.togglePassword = function(f, i) {
        const d = document.getElementById(f);
        if (d.type === 'password') {
            d.type = 'text';
            i.classList.remove('fa-eye');
            i.classList.add('fa-eye-slash');
        } else {
            d.type = 'password';
            i.classList.remove('fa-eye-slash');
            i.classList.add('fa-eye');
        }
    };

    const signinModeBtn = document.getElementById('signinModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const switchText = document.getElementById('switchText');
    const googleBtnText = document.getElementById('googleBtnText');

    function setMode(m) {
        if (m === 'signin') {
            signinModeBtn.classList.add('active');
            signupModeBtn.classList.remove('active');
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            switchText.innerHTML = 'Don\'t have an account? <span id="switchBtn">Sign Up</span>';
            googleBtnText.innerText = 'Sign in with Google';
            const b = document.getElementById('switchBtn');
            if (b) b.onclick = () => setMode('signup');
        } else {
            signupModeBtn.classList.add('active');
            signinModeBtn.classList.remove('active');
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            switchText.innerHTML = 'Already have an account? <span id="switchBtn">Sign In</span>';
            googleBtnText.innerText = 'Sign up with Google';
            const b = document.getElementById('switchBtn');
            if (b) b.onclick = () => setMode('signin');
        }
        hideMessages();
    }
    signinModeBtn.onclick = () => setMode('signin');
    signupModeBtn.onclick = () => setMode('signup');

    function showError(m) {
        const e = document.getElementById('errorMessage');
        e.textContent = m;
        e.style.display = 'block';
        setTimeout(() => e.style.display = 'none', 5000);
    }
    function showSuccess(m) {
        const e = document.getElementById('successMessage');
        e.textContent = m;
        e.style.display = 'block';
        setTimeout(() => e.style.display = 'none', 5000);
    }
    function hideMessages() {
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        } else {
            btn.disabled = false;
            if (btnId === 'signinBtn') {
                btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
            } else if (btnId === 'signupBtn') {
                btn.innerHTML = 'Create Account <i class="fas fa-user-plus"></i>';
            }
        }
    }

    // Forgot Password
    document.getElementById('forgotPasswordLink').onclick = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        if (!email) {
            showError('Please enter your email address');
            return;
        }
        const redirectUrl = window.location.origin + '/reset-password.html';
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
        error ? showError(error.message) : showSuccess('Password reset link sent to your email!');
    };

    // Sign Up
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value.trim();
        const pwd = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;
        
        if (!email || !pwd || !confirm) return showError('Please fill in all fields');
        if (pwd !== confirm) return showError('Passwords do not match');
        if (pwd.length < 6) return showError('Password must be at least 6 characters');
        
        setLoading('signupBtn', true);
        
        const redirectUrl = window.location.origin + '/confirm.html';
        const { data, error } = await sb.auth.signUp({ 
            email, 
            password: pwd, 
            options: { emailRedirectTo: redirectUrl } 
        });
        
        setLoading('signupBtn', false);
        
        if (error) {
            if (error.message && (error.message.includes('already registered') || error.message.includes('User already registered'))) {
                showError('An account with this email already exists. Please sign in instead.');
            } else {
                showError(error.message);
            }
        } else {
            showSuccess('Confirmation email sent! Please check your inbox.');
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirmPassword').value = '';
            setTimeout(() => setMode('signin'), 4000);
        }
    };

    // Sign In
    document.getElementById('signinForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        const pwd = document.getElementById('signinPassword').value;
        if (!email || !pwd) return showError('Please enter email and password');
        
        setLoading('signinBtn', true);
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
        setLoading('signinBtn', false);
        
        if (error) {
            if (error.message.includes('Email not confirmed')) {
                showError('Please confirm your email first. Check your inbox!');
            } else if (error.message.includes('Invalid login credentials')) {
                showError('Invalid email or password');
            } else {
                showError(error.message);
            }
            return;
        }
        
        if (data.user) {
            const user = { 
                id: data.user.id, 
                email: data.user.email, 
                name: data.user.user_metadata?.full_name || email.split('@')[0], 
                picture: data.user.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${email.split('@')[0]}` 
            };
            localStorage.setItem('cryptotax_current_user', JSON.stringify(user));
            showSuccess('Signed in! Redirecting...');
            setTimeout(() => window.location.href = window.location.origin + '/dashboard.html', 1500);
        }
    };

    // Google Sign In
    document.getElementById('googleSignInBtn').onclick = async (e) => {
        e.preventDefault();
        try {
            const redirectUrl = window.location.origin + '/dashboard.html';
            const { error } = await sb.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: redirectUrl, queryParams: { prompt: 'select_account' } } 
            });
            if (error) throw error;
        } catch (err) {
            showError(err.message);
        }
    };

    // Check existing session
    (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
            const user = { 
                id: session.user.id, 
                email: session.user.email, 
                name: session.user.user_metadata?.full_name || session.user.email.split('@')[0], 
                picture: session.user.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${session.user.email.split('@')[0]}` 
            };
            localStorage.setItem('cryptotax_current_user', JSON.stringify(user));
            window.location.href = window.location.origin + '/dashboard.html';
        }
    })();
    
    setMode('signin');
})();
</script>
</body>
</html>
