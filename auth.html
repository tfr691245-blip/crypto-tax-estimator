<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoTax | Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0C15;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui;
        }
        .card {
            background: rgba(13,15,23,0.9);
            padding: 48px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(247,147,26,0.2);
            max-width: 420px;
            width: 90%;
        }
        h1 {
            color: white;
            margin-bottom: 32px;
            font-size: 28px;
        }
        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: #1a1f36;
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .divider {
            color: #6C729B;
            margin: 20px 0;
            font-size: 12px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(5,7,10,0.6);
            border: 1px solid rgba(247,147,26,0.2);
            border-radius: 20px;
            color: white;
            margin-bottom: 12px;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border: none;
            border-radius: 60px;
            color: #05070A;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        .switch-btn {
            color: #F7931A;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
        }
        .error {
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 8px;
        }
        .success {
            color: #4CAF50;
            font-size: 12px;
            margin-top: 8px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🔐 CRYPTOTAX</h1>
    
    <button id="googleBtn" class="google-btn">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
    </button>
    
    <div class="divider">or</div>
    
    <div id="signinForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="signinBtn" class="submit-btn">Sign In</button>
        <div style="text-align: center; margin-top: 12px;">
            <span id="showSignup" class="switch-btn">Don't have an account? Sign Up</span>
        </div>
    </div>
    
    <div id="signupForm" class="hidden">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <input type="password" id="signupConfirm" placeholder="Confirm Password">
        <button id="signupBtn" class="submit-btn">Create Account</button>
        <div style="text-align: center; margin-top: 12px;">
            <span id="showSignin" class="switch-btn">Already have an account? Sign In</span>
        </div>
    </div>
    
    <div id="message" class="error"></div>
</div>

<script>
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const messageDiv = document.getElementById('message');
    
    function showMessage(msg, isError = true) {
        messageDiv.textContent = msg;
        messageDiv.className = isError ? 'error' : 'success';
        setTimeout(() => { messageDiv.textContent = ''; }, 5000);
    }
    
    // Google Sign In
    document.getElementById('googleBtn').onclick = async () => {
        try {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://elite.qzz.io/dashboard.html' }
            });
            if (error) showMessage(error.message);
        } catch(err) { showMessage(err.message); }
    };
    
    // Sign In
    document.getElementById('signinBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            showMessage('Please enter email and password');
            return;
        }
        
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
            showMessage(error.message);
        } else {
            localStorage.setItem('cryptotax_current_user', JSON.stringify({
                id: data.user.id,
                email: data.user.email,
                name: data.user.user_metadata?.full_name || email.split('@')[0]
            }));
            window.location.href = 'https://elite.qzz.io/dashboard.html';
        }
    };
    
    // Sign Up
    document.getElementById('signupBtn').onclick = async () => {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;
        
        if (!email || !password || !confirm) {
            showMessage('Please fill all fields');
            return;
        }
        if (password !== confirm) {
            showMessage('Passwords do not match');
            return;
        }
        if (password.length < 6) {
            showMessage('Password must be at least 6 characters');
            return;
        }
        
        const { error } = await supabase.auth.signUp({
            email, password,
            options: { emailRedirectTo: 'https://elite.qzz.io/dashboard.html' }
        });
        
        if (error) {
            showMessage(error.message);
        } else {
            showMessage('Check your email for confirmation link!', false);
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirm').value = '';
            document.getElementById('showSignin').click();
        }
    };
    
    // Toggle between Sign In and Sign Up
    document.getElementById('showSignup').onclick = () => {
        document.getElementById('signinForm').classList.add('hidden');
        document.getElementById('signupForm').classList.remove('hidden');
    };
    
    document.getElementById('showSignin').onclick = () => {
        document.getElementById('signupForm').classList.add('hidden');
        document.getElementById('signinForm').classList.remove('hidden');
    };
    
    // Check existing session
    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            window.location.href = 'https://elite.qzz.io/dashboard.html';
        }
    });
</script>
</body>
</html>
