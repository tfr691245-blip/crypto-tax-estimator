<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0A0C15;
            font-family: system-ui;
            color: white;
            padding: 40px;
        }
        .card {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(13,15,23,0.9);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(247,147,26,0.2);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
        }
        .email { color: #F7931A; }
        button {
            background: rgba(247,147,26,0.2);
            border: 1px solid rgba(247,147,26,0.3);
            color: #F7931A;
            padding: 12px 24px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="card">
    <div id="userInfo">
        <div class="user-info">
            <img id="avatar" class="avatar" src="">
            <div>
                <div id="email" class="email"></div>
                <div id="name"></div>
            </div>
        </div>
        <button id="logoutBtn">Sign Out</button>
    </div>
    <div id="loading">Loading...</div>
</div>

<script>
    const supabase = window.supabase.createClient(
        'https://ihtazaanlobowggooghy.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY'
    );

    async function loadUser() {
        const { data: { user } } = await supabase.auth.getUser();
        
        if (!user) {
            window.location.href = 'https://elite.qzz.io/auth.html';
            return;
        }
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('userInfo').style.display = 'block';
        document.getElementById('email').innerText = user.email;
        document.getElementById('name').innerText = user.user_metadata?.full_name || user.email.split('@')[0];
        document.getElementById('avatar').src = user.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${user.email}`;
    }
    
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = 'https://elite.qzz.io/auth.html';
    });
    
    loadUser();
</script>
</body>
</html>
