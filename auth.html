<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Authentication Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0C15;transition:background .3s ease}
        body.light{background:#F5F7FF}
        .auth-card{background:rgba(13,15,23,.85);backdrop-filter:blur(20px);border-radius:48px;padding:48px 40px;border:1px solid rgba(247,147,26,.25)}
        body.light .auth-card{background:rgba(255,255,255,.95)}
        .logo-icon{width:75px;height:75px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
        .logo h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,#F7931A,#FFD166);-webkit-background-clip:text;background-clip:text;color:transparent}
        .mode-toggle{display:flex;gap:10px;margin-bottom:32px}
        .mode-btn{flex:1;padding:12px;border-radius:60px;font-weight:600;cursor:pointer;background:transparent;border:none;color:#6C729B}
        .mode-btn.active{background:linear-gradient(135deg,#F7931A,#FF6B00);color:#05070A}
        .form-group{margin-bottom:20px;position:relative}
        .form-group input{width:100%;padding:16px 20px;background:rgba(5,7,10,.6);border:1.5px solid rgba(247,147,26,.15);border-radius:20px;color:#E8EDF5;font-family:'Space Grotesk',monospace}
        body.light .form-group input{background:rgba(0,0,0,.03);color:#1A1F36}
        .form-group input:focus{border-color:#F7931A;outline:none}
        .form-group i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#F7931A;cursor:pointer}
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#F7931A,#FF6B00);border:none;border-radius:60px;font-weight:700;color:#05070A;cursor:pointer;margin-top:12px}
        .google-btn{width:100%;padding:14px;background:rgba(255,255,255,.03);border:1.5px solid rgba(247,147,26,.25);border-radius:60px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px}
        .error-message,.success-message{padding:12px;border-radius:16px;font-size:12px;margin-bottom:20px;display:none}
        .error-message{background:rgba(255,68,68,.1);border-left:3px solid #FF4444;color:#FF6B6B}
        .success-message{background:rgba(76,175,80,.1);border-left:3px solid #4CAF50;color:#4CAF50}
        .hidden{display:none!important}
        .forgot-password{text-align:right;margin-bottom:20px}
        .forgot-password a{color:#F7931A;font-size:12px;cursor:pointer;text-decoration:none}
        .divider{text-align:center;margin:20px 0;color:#6C729B}
        .switch-mode{text-align:center;margin-top:20px;color:#6C729B}
        .switch-mode span{color:#F7931A;cursor:pointer}
        @media(max-width:550px){.auth-card{padding:32px 24px}}
    </style>
</head>
<body>
<div class="auth-container" style="width:100%;max-width:460px;margin:20px">
    <div class="auth-card">
        <div class="logo" style="text-align:center;margin-bottom:40px;cursor:pointer" onclick="location.href='index.html'">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <h2>CRYPTOTAX</h2>
            <p style="color:#8E94B3;font-size:12px">Enterprise Authentication Portal</p>
        </div>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="signinModeBtn">Sign In</button>
            <button class="mode-btn" id="signupModeBtn">Sign Up</button>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <!-- Sign In Form -->
        <form id="signinForm">
            <div class="form-group">
                <input type="email" id="signinEmail" placeholder="Email address" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signinPassword" placeholder="Password" required>
                <i class="fas fa-eye" onclick="togglePassword('signinPassword',this)"></i>
            </div>
            <div class="forgot-password">
                <a id="forgotPasswordLink">Forgot password?</a>
            </div>
            <button type="submit" class="submit-btn">Sign In <i class="fas fa-arrow-right"></i></button>
        </form>
        
        <!-- Sign Up Form -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <input type="email" id="signupEmail" placeholder="Email address" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signupPassword" placeholder="Password" required>
                <i class="fas fa-eye" onclick="togglePassword('signupPassword',this)"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
                <i class="fas fa-check-circle"></i>
            </div>
            <button type="submit" class="submit-btn">Create Account <i class="fas fa-user-plus"></i></button>
        </form>
        
        <div class="divider"><span>or continue with</span></div>
        <button id="googleSignInBtn" class="google-btn">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span class="google-text" id="googleBtnText">Sign in with Google</span>
        </button>
        
        <div class="switch-mode"><span id="switchText">Don't have an account? <span id="switchBtn">Sign Up</span></span></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') document.body.classList.add('light');

window.togglePassword = function(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
};

function showError(msg) {
    const el = document.getElementById('errorMessage');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
}

function showSuccess(msg) {
    const el = document.getElementById('successMessage');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
}

// Mode switching
const signinModeBtn = document.getElementById('signinModeBtn');
const signupModeBtn = document.getElementById('signupModeBtn');
const signinForm = document.getElementById('signinForm');
const signupForm = document.getElementById('signupForm');
const switchText = document.getElementById('switchText');

function setMode(mode) {
    if (mode === 'signin') {
        signinModeBtn.classList.add('active');
        signupModeBtn.classList.remove('active');
        signinForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
        switchText.innerHTML = 'Don\'t have an account? <span id="switchBtn">Sign Up</span>';
        document.getElementById('googleBtnText').innerText = 'Sign in with Google';
        document.getElementById('switchBtn')?.addEventListener('click', () => setMode('signup'));
    } else {
        signupModeBtn.classList.add('active');
        signinModeBtn.classList.remove('active');
        signupForm.classList.remove('hidden');
        signinForm.classList.add('hidden');
        switchText.innerHTML = 'Already have an account? <span id="switchBtn">Sign In</span>';
        document.getElementById('googleBtnText').innerText = 'Sign up with Google';
        document.getElementById('switchBtn')?.addEventListener('click', () => setMode('signin'));
    }
}

setMode('signin');

// Forgot Password
document.getElementById('forgotPasswordLink').onclick = async () => {
    const email = document.getElementById('signinEmail').value.trim();
    if (!email) return showError('Please enter your email address');
    
    const redirectUrl = `${window.location.origin}/reset-password.html`;
    const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
    error ? showError(error.message) : showSuccess('Password reset link sent! Check your email.');
};

// Sign Up
document.getElementById('signupForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupConfirmPassword').value;
    
    if (!email || !password) return showError('Please fill all fields');
    if (password !== confirm) return showError('Passwords do not match');
    if (password.length < 6) return showError('Password must be at least 6 characters');
    
    const redirectUrl = `${window.location.origin}/confirm.html`;
    const { error } = await supabase.auth.signUp({ 
        email, 
        password, 
        options: { emailRedirectTo: redirectUrl } 
    });
    
    error ? showError(error.message) : showSuccess('Confirmation email sent! Check your inbox.');
};

// Sign In
document.getElementById('signinForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return showError(error.message);
    
    if (data.user) {
        localStorage.setItem('cryptotax_current_user', JSON.stringify({
            id: data.user.id,
            email: data.user.email,
            name: data.user.email.split('@')[0]
        }));
        showSuccess('Signed in! Redirecting...');
        setTimeout(() => window.location.href = `${window.location.origin}/dashboard.html`, 1500);
    }
};

// Google Sign In
document.getElementById('googleSignInBtn').onclick = async () => {
    const redirectUrl = `${window.location.origin}/dashboard.html`;
    const { error } = await supabase.auth.signInWithOAuth({ 
        provider: 'google', 
        options: { redirectTo: redirectUrl } 
    });
    if (error) showError(error.message);
};

// Check existing session
supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) {
        window.location.href = `${window.location.origin}/dashboard.html`;
    }
});
</script>
</body>
</html>
