<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Authentication Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0A0C15;
            --bg-secondary: #0D0F17;
            --bg-card: #0D0F17;
            --text-primary: #E8EDF5;
            --text-secondary: #8E94B3;
            --text-muted: #6C729B;
            --border-color: #1A1E2C;
            --border-light: rgba(247, 147, 26, 0.15);
            --accent: #F7931A;
            --accent-gradient: linear-gradient(135deg, #F7931A 0%, #E07C0A 100%);
            --shadow: 0 8px 20px rgba(247, 147, 26, 0.25);
        }

        body.light {
            --bg-primary: #F5F7FF;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --text-primary: #1A1F36;
            --text-secondary: #4A5568;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --border-light: rgba(247, 147, 26, 0.2);
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-radius: 24px;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(247,147,26,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent);
            text-decoration: none;
        }
        
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg,#F7931A,#FF6B00); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo-text h1 { font-size: 24px; font-weight: 800; background: linear-gradient(135deg,#F7931A,#FFD166); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .theme-toggle {
            width: 40px;
            height: 40px;
            background: rgba(247,147,26,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .auth-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid var(--border-light);
        }
        
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header h2 { font-size: 28px; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .mode-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            border-radius: 60px;
            padding: 4px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--text-muted);
        }
        
        .mode-btn.active {
            background: var(--accent-gradient);
            color: #05070A;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 16px;
        }
        
        .form-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .google-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            color: var(--text-muted);
        }
        
        .error-message, .success-message {
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message { background: rgba(255,68,68,0.1); border-left: 3px solid #FF4444; color: #FF6B6B; }
        .success-message { background: rgba(76,175,80,0.1); border-left: 3px solid #4CAF50; color: #4CAF50; }
        
        .hidden { display: none !important; }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: #05070A;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="logo" onclick="location.href='index.html'">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <div class="logo-text"><h1>CRYPTOTAX</h1></div>
        </div>
        <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
    </div>

    <div class="auth-card">
        <div class="auth-header"><h2>Welcome Back</h2></div>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="signinModeBtn">Sign In</button>
            <button class="mode-btn" id="signupModeBtn">Sign Up</button>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="signinForm">
            <div class="form-group"><input type="email" id="signinEmail" placeholder="Email" required><i class="fas fa-envelope"></i></div>
            <div class="form-group"><input type="password" id="signinPassword" placeholder="Password" required><i class="fas fa-eye" onclick="togglePassword('signinPassword',this)"></i></div>
            <div class="forgot-password" style="text-align:right; margin-bottom:15px;"><a href="#" id="forgotPasswordLink" style="color:var(--accent); font-size:13px;">Forgot password?</a></div>
            <button type="submit" id="signinBtn" class="submit-btn">Sign In</button>
        </form>
        
        <form id="signupForm" class="hidden">
            <div class="form-group"><input type="email" id="signupEmail" placeholder="Email" required><i class="fas fa-envelope"></i></div>
            <div class="form-group"><input type="password" id="signupPassword" placeholder="Password" required><i class="fas fa-eye" onclick="togglePassword('signupPassword',this)"></i></div>
            <div class="form-group"><input type="password" id="signupConfirmPassword" placeholder="Confirm password" required><i class="fas fa-check-circle"></i></div>
            <button type="submit" id="signupBtn" class="submit-btn">Create Account</button>
        </form>
        
        <div class="divider"><span>or</span></div>
        
        <button id="googleSignInBtn" class="google-btn">
            <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span>Sign in with Google</span>
        </button>
        
        <div class="switch-mode" style="text-align:center; margin-top:20px;">
            <span id="switchText">Don't have an account? <span id="switchBtn" style="color:var(--accent); cursor:pointer;">Sign Up</span></span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Theme Toggle
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') document.body.classList.add('light');
    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };

    window.togglePassword = function(fieldId, icon) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    };

    const signinModeBtn = document.getElementById('signinModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const switchText = document.getElementById('switchText');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');

    function setMode(mode) {
        if (mode === 'signin') {
            signinModeBtn.classList.add('active');
            signupModeBtn.classList.remove('active');
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            switchText.innerHTML = 'Don\'t have an account? <span id="switchBtn" style="color:var(--accent); cursor:pointer;">Sign Up</span>';
            document.querySelector('#switchBtn')?.addEventListener('click', () => setMode('signup'));
        } else {
            signupModeBtn.classList.add('active');
            signinModeBtn.classList.remove('active');
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            switchText.innerHTML = 'Already have an account? <span id="switchBtn" style="color:var(--accent); cursor:pointer;">Sign In</span>';
            document.querySelector('#switchBtn')?.addEventListener('click', () => setMode('signin'));
        }
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
    }

    signinModeBtn.onclick = () => setMode('signin');
    signupModeBtn.onclick = () => setMode('signup');
    setMode('signin');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        setTimeout(() => successDiv.style.display = 'none', 5000);
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        } else {
            btn.disabled = false;
            btn.innerHTML = btnId === 'signinBtn' ? 'Sign In' : 'Create Account';
        }
    }

    // Forgot Password
    document.getElementById('forgotPasswordLink').onclick = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        if (!email) return showError('Enter your email');
        const redirectUrl = window.location.origin + '/reset-password.html';
        const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectUrl });
        error ? showError(error.message) : showSuccess('Reset link sent!');
    };

    // SIGN UP - FIXED: WORKS FOR BOTH INSTRUCTIONS
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value.trim();
        const pwd = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;
        
        if (!email || !pwd) return showError('Fill all fields');
        if (pwd !== confirm) return showError('Passwords do not match');
        if (pwd.length < 6) return showError('Password must be at least 6 characters');
        
        setLoading('signupBtn', true);
        
        const redirectUrl = window.location.origin + '/confirm.html';
        const { error } = await sb.auth.signUp({ 
            email, 
            password: pwd, 
            options: { emailRedirectTo: redirectUrl } 
        });
        
        setLoading('signupBtn', false);
        
        if (error) {
            if (error.message === 'User already registered') {
                // TRY TO RESEND CONFIRMATION EMAIL
                const { error: otpError } = await sb.auth.signInWithOtp({
                    email: email,
                    options: { emailRedirectTo: redirectUrl }
                });
                
                if (otpError && otpError.message === 'User already registered') {
                    // THIS IS A CONFIRMED USER (Google login or verified) → Instruction 1
                    showError('Account already exists with this email. Please sign in instead.');
                } else {
                    // OTP SENT - UNCONFIRMED USER → Instruction 2
                    showSuccess('Verification email resent! Please check your inbox.');
                }
            } else {
                showError(error.message);
            }
        } else {
            // NEW USER → Instruction 2
            showSuccess('Confirmation email sent! Please check your inbox.');
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('signupConfirmPassword').value = '';
            setTimeout(() => setMode('signin'), 3000);
        }
    };

    // Sign In
    document.getElementById('signinForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        const pwd = document.getElementById('signinPassword').value;
        if (!email || !pwd) return showError('Enter email and password');
        
        setLoading('signinBtn', true);
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
        setLoading('signinBtn', false);
        
        if (error) {
            if (error.message.includes('Email not confirmed')) {
                showError('Please confirm your email first. Check your inbox.');
            } else if (error.message.includes('Invalid login credentials')) {
                showError('Invalid email or password');
            } else {
                showError(error.message);
            }
            return;
        }
        
        if (data.user) {
            localStorage.setItem('cryptotax_current_user', JSON.stringify({
                id: data.user.id,
                email: data.user.email,
                name: data.user.email.split('@')[0]
            }));
            showSuccess('Signed in! Redirecting...');
            setTimeout(() => window.location.href = window.location.origin + '/dashboard.html', 1500);
        }
    };

    // Google Sign In
    document.getElementById('googleSignInBtn').onclick = async () => {
        try {
            const redirectUrl = window.location.origin + '/dashboard.html';
            const { error } = await sb.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: redirectUrl } 
            });
            if (error) throw error;
        } catch (err) {
            showError(err.message);
        }
    };

    // Check existing session
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            window.location.href = window.location.origin + '/dashboard.html';
        }
    });
})();
</script>
</body>
</html>
