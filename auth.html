<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0C15;transition:background .3s ease}
        body.light{background:#F5F7FF}
        .auth-card{background:rgba(13,15,23,.85);backdrop-filter:blur(20px);border-radius:48px;padding:48px 40px;border:1px solid rgba(247,147,26,.25);width:100%;max-width:460px;margin:20px}
        body.light .auth-card{background:rgba(255,255,255,.95)}
        .logo-icon{width:75px;height:75px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px;cursor:pointer}
        .logo h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,#F7931A,#FFD166);-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center}
        .logo p{text-align:center;color:#8E94B3;font-size:12px;margin-top:6px}
        .mode-toggle{display:flex;gap:10px;margin:32px 0;background:rgba(0,0,0,.2);border-radius:60px;padding:4px}
        .mode-btn{flex:1;padding:12px;border-radius:60px;font-weight:600;cursor:pointer;background:transparent;border:none;color:#6C729B;font-family:'Outfit',sans-serif}
        .mode-btn.active{background:linear-gradient(135deg,#F7931A,#FF6B00);color:#05070A}
        .form-group{margin-bottom:20px;position:relative}
        .form-group input{width:100%;padding:16px 20px;background:rgba(5,7,10,.6);border:1.5px solid rgba(247,147,26,.15);border-radius:20px;font-size:14px;color:#E8EDF5;font-family:'Space Grotesk',monospace;outline:none}
        body.light .form-group input{background:rgba(0,0,0,.03);color:#1A1F36}
        .form-group input:focus{border-color:#F7931A}
        .form-group i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#F7931A;cursor:pointer}
        .forgot-password{text-align:right;margin-bottom:20px}
        .forgot-password a{color:#F7931A;font-size:12px;cursor:pointer;text-decoration:none}
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#F7931A,#FF6B00);border:none;border-radius:60px;font-size:16px;font-weight:700;color:#05070A;cursor:pointer;margin-top:12px}
        .divider{text-align:center;margin:24px 0;color:#6C729B;font-size:12px}
        .divider::before,.divider::after{content:'';display:inline-block;width:40%;height:1px;background:rgba(247,147,26,.15);vertical-align:middle}
        .divider span{margin:0 12px}
        .google-btn{width:100%;padding:14px;background:rgba(255,255,255,.03);border:1.5px solid rgba(247,147,26,.25);border-radius:60px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;margin-top:20px;font-family:'Outfit',sans-serif}
        .google-text{font-size:15px;font-weight:600;color:#E8EDF5}
        body.light .google-text{color:#1A1F36}
        .switch-mode{text-align:center;margin-top:24px;font-size:13px;color:#6C729B}
        .switch-mode span{color:#F7931A;cursor:pointer;font-weight:600}
        .error-message,.success-message{padding:12px;border-radius:16px;font-size:12px;margin-bottom:20px;display:none}
        .error-message{background:rgba(255,68,68,.1);border-left:3px solid #FF4444;color:#FF6B6B}
        .success-message{background:rgba(76,175,80,.1);border-left:3px solid #4CAF50;color:#4CAF50}
        .hidden{display:none!important}
        .top-bar{position:fixed;top:0;left:0;right:0;padding:20px 24px;display:flex;justify-content:space-between;z-index:100}
        .back-btn,.theme-toggle{width:48px;height:48px;background:rgba(13,15,23,.6);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(247,147,26,.3);color:#F7931A;text-decoration:none}
        body.light .back-btn,body.light .theme-toggle{background:rgba(255,255,255,.8)}
        @media(max-width:550px){.auth-card{padding:32px 24px}.back-btn,.theme-toggle{width:42px;height:42px}}
    </style>
</head>
<body>
<div class="top-bar">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
</div>

<div class="auth-card">
    <div class="logo" onclick="location.href='index.html'">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <h2>CRYPTOTAX</h2>
        <p>Enterprise Authentication Portal</p>
    </div>
    
    <div class="mode-toggle">
        <button class="mode-btn active" id="signinModeBtn">Sign In</button>
        <button class="mode-btn" id="signupModeBtn">Sign Up</button>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="signinForm">
        <div class="form-group">
            <input type="email" id="signinEmail" placeholder="Email address" required>
            <i class="fas fa-envelope"></i>
        </div>
        <div class="form-group">
            <input type="password" id="signinPassword" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" data-target="signinPassword"></i>
        </div>
        <div class="forgot-password">
            <a id="forgotPasswordLink">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn">Sign In <i class="fas fa-arrow-right"></i></button>
    </form>
    
    <form id="signupForm" class="hidden">
        <div class="form-group">
            <input type="email" id="signupEmail" placeholder="Email address" required>
            <i class="fas fa-envelope"></i>
        </div>
        <div class="form-group">
            <input type="password" id="signupPassword" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" data-target="signupPassword"></i>
        </div>
        <div class="form-group">
            <input type="password" id="signupConfirmPassword" placeholder="Confirm password" required>
            <i class="fas fa-eye toggle-password" data-target="signupConfirmPassword"></i>
        </div>
        <button type="submit" class="submit-btn">Create Account <i class="fas fa-user-plus"></i></button>
    </form>
    
    <div class="divider"><span>or</span></div>
    <button id="googleSignInBtn" class="google-btn">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span class="google-text">Sign in with Google</span>
    </button>
    
    <div class="switch-mode">
        <span id="switchText">Don't have an account? <span id="switchBtn">Sign Up</span></span>
    </div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') document.body.classList.add('light');
    
    themeToggle.onclick = () => {
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    };

    // Password Visibility
    document.querySelectorAll('.toggle-password').forEach(icon => {
        icon.onclick = function() {
            const input = document.getElementById(this.dataset.target);
            input.type = input.type === 'password' ? 'text' : 'password';
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        };
    });

    // Form Switching
    const signinModeBtn = document.getElementById('signinModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const switchBtn = document.getElementById('switchBtn');
    const errorDiv = document.getElementById('errorMessage');
    const successDiv = document.getElementById('successMessage');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        setTimeout(() => successDiv.style.display = 'none', 5000);
    }

    function toggleMode(mode) {
        if (mode === 'signup') {
            signinForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
            signinModeBtn.classList.remove('active');
            signupModeBtn.classList.add('active');
            document.getElementById('switchText').innerHTML = 'Already have an account? <span id="switchBtn">Sign In</span>';
        } else {
            signupForm.classList.add('hidden');
            signinForm.classList.remove('hidden');
            signupModeBtn.classList.remove('active');
            signinModeBtn.classList.add('active');
            document.getElementById('switchText').innerHTML = 'Don\'t have an account? <span id="switchBtn">Sign Up</span>';
        }
        document.getElementById('switchBtn').onclick = () => toggleMode(mode === 'signup' ? 'signin' : 'signup');
    }

    signinModeBtn.onclick = () => toggleMode('signin');
    signupModeBtn.onclick = () => toggleMode('signup');
    switchBtn.onclick = () => toggleMode('signup');

    // Reset Password
    document.getElementById('forgotPasswordLink').onclick = async () => {
        const email = document.getElementById('signinEmail').value.trim();
        if (!email) return showError('Please enter your email address');
        const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: `${window.location.origin}/reset-password.html` });
        error ? showError(error.message) : showSuccess('Password reset link sent!');
    };

    // Sign Up
    document.getElementById('signupForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;
        if (password !== confirm) return showError('Passwords do not match');
        const { error } = await supabase.auth.signUp({ email, password, options: { emailRedirectTo: `${window.location.origin}/confirm.html` } });
        error ? showError(error.message) : showSuccess('Confirmation email sent!');
    };

    // Sign In
    document.getElementById('signinForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        const password = document.getElementById('signinPassword').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return showError(error.message);
        if (data.user) {
            localStorage.setItem('cryptotax_current_user', JSON.stringify({ id: data.user.id, email: data.user.email }));
            window.location.href = 'dashboard.html';
        }
    };

    // Google
    document.getElementById('googleSignInBtn').onclick = async () => {
        await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: `${window.location.origin}/dashboard.html` } });
    };

    supabase.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'dashboard.html';
    });
})();
</script>
</body>
</html>
