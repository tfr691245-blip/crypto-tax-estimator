<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Authentication Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            background: #0A0C15;
        }

        /* Animated Gradient Background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .animated-bg .gradient-1 {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.15), rgba(224, 124, 10, 0.05), transparent 70%);
            animation: rotateBg 25s linear infinite;
        }

        .animated-bg .gradient-2 {
            position: absolute;
            bottom: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1), rgba(79, 70, 229, 0.05), transparent 70%);
            animation: rotateBgReverse 20s linear infinite;
        }

        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateBgReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(247, 147, 26, 0.3);
            border-radius: 50%;
            animation: floatParticle 8s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-30px) translateX(20px) scale(1.2); opacity: 0.6; }
        }

        /* Main Container */
        .auth-container {
            width: 100%;
            max-width: 500px;
            margin: 20px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.4, 1);
            perspective: 1000px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) rotateX(10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        /* Glass Card with Glow Effect */
        .auth-card {
            background: rgba(13, 15, 23, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(247, 147, 26, 0.2);
            padding: 52px 44px;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(247, 147, 26, 0.1);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(247, 147, 26, 0.08), transparent);
            transition: left 0.6s ease;
        }

        .auth-card:hover::before {
            left: 100%;
        }

        .auth-card:hover {
            border-color: rgba(247, 147, 26, 0.4);
            box-shadow: 0 50px 100px -20px rgba(247, 147, 26, 0.2);
            transform: translateY(-5px);
        }

        @media (max-width: 550px) {
            .auth-card {
                padding: 36px 28px;
                border-radius: 40px;
            }
        }

        /* Logo Section with Animation */
        .logo {
            text-align: center;
            margin-bottom: 44px;
            cursor: pointer;
            position: relative;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 18px;
            box-shadow: 0 15px 35px rgba(247, 147, 26, 0.3);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 15px 35px rgba(247, 147, 26, 0.3);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 20px 45px rgba(247, 147, 26, 0.5);
                transform: scale(1.02);
            }
        }

        .logo-icon:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .logo h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #F7931A, #FFD166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 13px;
            color: #8E94B3;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Mode Toggle with Animation */
        .mode-toggle {
            display: flex;
            gap: 12px;
            background: rgba(5, 7, 10, 0.6);
            padding: 6px;
            border-radius: 80px;
            margin-bottom: 36px;
            border: 1px solid rgba(247, 147, 26, 0.15);
            position: relative;
        }

        .mode-toggle::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(50% - 6px);
            height: calc(100% - 12px);
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border-radius: 60px;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.4, 1);
            z-index: 0;
        }

        .mode-toggle.signup-mode::before {
            transform: translateX(100%);
        }

        .mode-btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #6C729B;
            border: none;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .mode-btn.active {
            color: #05070A;
        }

        /* Form Styles with Animation */
        .form-group {
            margin-bottom: 24px;
            position: relative;
            transform: translateX(0);
            transition: all 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 18px 22px;
            background: rgba(5, 7, 10, 0.5);
            border: 1.5px solid rgba(247, 147, 26, 0.15);
            border-radius: 24px;
            font-size: 15px;
            color: #E8EDF5;
            font-family: 'Space Grotesk', monospace;
            outline: none;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
        }

        .form-group input:focus {
            border-color: #F7931A;
            box-shadow: 0 0 0 4px rgba(247, 147, 26, 0.1);
            transform: translateX(5px);
            background: rgba(5, 7, 10, 0.8);
        }

        .form-group input::placeholder {
            color: #4A5568;
            font-weight: 400;
        }

        .form-group i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #F7931A;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px;
        }

        .form-group i:hover {
            opacity: 0.7;
            transform: translateY(-50%) scale(1.1);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 800;
            color: #05070A;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
            font-family: 'Outfit', sans-serif;
            margin-top: 16px;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(247, 147, 26, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 32px 0;
            color: #6C729B;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(247, 147, 26, 0.15);
        }

        .divider span {
            margin: 0 18px;
            font-weight: 500;
        }

        /* Google Icon Button - Professional */
        .google-icon-btn {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(247, 147, 26, 0.2);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.4, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #E8EDF5;
            font-family: 'Outfit', sans-serif;
        }

        .google-icon-btn i {
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .google-icon-btn:hover {
            background: rgba(247, 147, 26, 0.08);
            border-color: #F7931A;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(247, 147, 26, 0.2);
        }

        .google-icon-btn:hover i {
            transform: scale(1.1);
        }

        /* Switch Mode Link */
        .switch-mode {
            text-align: center;
            margin-top: 28px;
            font-size: 14px;
            color: #6C729B;
        }

        .switch-mode span {
            color: #F7931A;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
        }

        .switch-mode span::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #F7931A;
            transition: width 0.3s ease;
        }

        .switch-mode span:hover::after {
            width: 100%;
        }

        /* Message Alerts */
        .error-message,
        .success-message {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            background: rgba(255, 68, 68, 0.12);
            border-left: 3px solid #FF4444;
            color: #FF6B6B;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.12);
            border-left: 3px solid #4CAF50;
            color: #4CAF50;
        }

        .hidden {
            display: none !important;
        }

        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(5, 7, 10, 0.2);
            border-radius: 50%;
            border-top-color: #05070A;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .mode-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
            .form-group input {
                padding: 14px 18px;
                font-size: 14px;
            }
            .submit-btn {
                padding: 14px;
                font-size: 15px;
            }
            .logo-icon {
                width: 65px;
                height: 65px;
                font-size: 32px;
            }
            .logo h2 {
                font-size: 26px;
            }
        }

        /* Shake animation for errors */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body>
<div class="animated-bg">
    <div class="gradient-1"></div>
    <div class="gradient-2"></div>
</div>
<div class="particles" id="particles"></div>

<div class="auth-container">
    <div class="auth-card">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <h2>CRYPTOTAX</h2>
            <p>Enterprise Authentication Portal</p>
        </div>

        <div class="mode-toggle" id="modeToggle">
            <button class="mode-btn active" id="signinModeBtn">🔐 Sign In</button>
            <button class="mode-btn" id="signupModeBtn">📝 Sign Up</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Sign In Form -->
        <form id="signinForm">
            <div class="form-group">
                <input type="email" id="signinEmail" placeholder="Email Address" required autocomplete="email">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signinPassword" placeholder="Password" required autocomplete="current-password">
                <i class="fas fa-eye" onclick="togglePassword('signinPassword', this)"></i>
            </div>
            <button type="submit" class="submit-btn">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <!-- Sign Up Form -->
        <form id="signupForm" class="hidden">
            <div class="form-group">
                <input type="email" id="signupEmail" placeholder="Email Address" required autocomplete="email">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signupPassword" placeholder="Password" required autocomplete="new-password">
                <i class="fas fa-eye" onclick="togglePassword('signupPassword', this)"></i>
            </div>
            <div class="form-group">
                <input type="password" id="signupConfirmPassword" placeholder="Confirm Password" required>
                <i class="fas fa-check-circle"></i>
            </div>
            <button type="submit" class="submit-btn">
                Create Account <i class="fas fa-user-plus"></i>
            </button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <button id="googleSignInBtn" class="google-icon-btn">
            <i class="fab fa-google"></i> <span id="googleBtnText">Continue with Google</span>
        </button>

        <div class="switch-mode">
            <span id="switchText">Don't have an account? <span id="switchBtn">Sign Up</span></span>
        </div>
    </div>
</div>

<script>
    // Create floating particles
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 8 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 6 + 5) + 's';
            container.appendChild(particle);
        }
    }
    createParticles();

    // Supabase Configuration
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    const GOOGLE_CLIENT_ID = '39831574357-244ods19sr6ffqqcj0epkc6r8e6pucb3.apps.googleusercontent.com';

    function togglePassword(fieldId, iconElement) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        }
    }

    // Mode Toggle with Animation
    const signinModeBtn = document.getElementById('signinModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const modeToggle = document.getElementById('modeToggle');

    function setMode(mode) {
        if (mode === 'signin') {
            modeToggle.classList.remove('signup-mode');
            signinModeBtn.classList.add('active');
            signupModeBtn.classList.remove('active');
            signinForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            document.getElementById('switchText').innerHTML = `Don't have an account? <span id="switchBtn">Sign Up</span>`;
            document.getElementById('googleBtnText').innerText = 'Continue with Google';
            document.getElementById('switchBtn').onclick = () => setMode('signup');
        } else {
            modeToggle.classList.add('signup-mode');
            signupModeBtn.classList.add('active');
            signinModeBtn.classList.remove('active');
            signupForm.classList.remove('hidden');
            signinForm.classList.add('hidden');
            document.getElementById('switchText').innerHTML = `Already have an account? <span id="switchBtn">Sign In</span>`;
            document.getElementById('googleBtnText').innerText = 'Sign up with Google';
            document.getElementById('switchBtn').onclick = () => setMode('signin');
        }
        hideMessages();
    }

    signinModeBtn.onclick = () => setMode('signin');
    signupModeBtn.onclick = () => setMode('signup');

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
        document.querySelector('.auth-card').classList.add('shake');
        setTimeout(() => document.querySelector('.auth-card').classList.remove('shake'), 400);
        setTimeout(() => el.style.display = 'none', 4000);
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }

    function hideMessages() {
        document.getElementById('errorMessage').style.display = 'none';
        document.getElementById('successMessage').style.display = 'none';
    }

    // Local Storage Functions
    function getUsers() { return JSON.parse(localStorage.getItem('cryptotax_users') || '[]'); }
    function saveUsers(users) { localStorage.setItem('cryptotax_users', JSON.stringify(users)); }
    function saveCurrentUser(user) { localStorage.setItem('cryptotax_current_user', JSON.stringify(user)); }

    // Sign Up
    signupForm.onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirmPassword').value;

        if (!email || !password || !confirm) return showError('Please fill in all fields');
        if (password !== confirm) return showError('Passwords do not match');
        if (password.length < 6) return showError('Password must be at least 6 characters');

        const users = getUsers();
        if (users.find(u => u.email === email)) return showError('Email already registered');

        const newUser = {
            id: Date.now().toString(),
            email: email,
            password: btoa(password),
            name: email.split('@')[0],
            picture: `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${email.split('@')[0]}`,
            createdAt: new Date().toISOString()
        };
        users.push(newUser);
        saveUsers(users);
        saveCurrentUser({ id: newUser.id, email: newUser.email, name: newUser.name, picture: newUser.picture });
        showSuccess('Account created successfully! Redirecting...');
        setTimeout(() => window.location.href = 'index.html', 1500);
    };

    // Sign In
    signinForm.onsubmit = (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value.trim();
        const password = document.getElementById('signinPassword').value;

        if (!email || !password) return showError('Please enter email and password');

        const users = getUsers();
        const user = users.find(u => u.email === email && u.password === btoa(password));
        if (!user) return showError('Invalid email or password');

        saveCurrentUser({ id: user.id, email: user.email, name: user.name, picture: user.picture });
        showSuccess('Signed in successfully! Redirecting...');
        setTimeout(() => window.location.href = 'index.html', 1500);
    };

    // Google Sign In
    function handleGoogleCredentialResponse(response) {
        try {
            const data = JSON.parse(atob(response.credential.split('.')[1]));
            const users = getUsers();
            if (!users.find(u => u.email === data.email)) {
                users.push({
                    id: data.sub,
                    email: data.email,
                    name: data.name,
                    picture: data.picture,
                    googleLogin: true,
                    createdAt: new Date().toISOString()
                });
                saveUsers(users);
            }
            saveCurrentUser({ id: data.sub, email: data.email, name: data.name, picture: data.picture });
            showSuccess('Google sign in successful! Redirecting...');
            setTimeout(() => window.location.href = 'index.html', 1500);
        } catch (e) { showError('Google sign in failed'); }
    }

    function initGoogle() {
        if (typeof google !== 'undefined' && google.accounts) {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleCredentialResponse,
                auto_select: false,
                cancel_on_tap_outside: true
            });
            google.accounts.id.renderButton(document.getElementById('googleSignInBtn'), {
                type: 'icon',
                theme: 'outline',
                size: 'large',
                shape: 'circle',
                text: 'continue_with'
            });
        } else { setTimeout(initGoogle, 500); }
    }

    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.async = true;
    script.onload = initGoogle;
    document.head.appendChild(script);

    if (localStorage.getItem('cryptotax_current_user')) window.location.href = 'index.html';
    setMode('signin');
</script>
</body>
</html>
