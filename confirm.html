<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Email Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0C15}
        .confirm-card{background:rgba(13,15,23,.85);backdrop-filter:blur(20px);border-radius:48px;padding:48px 40px;text-align:center;border:1px solid rgba(247,147,26,.25);max-width:500px;margin:20px}
        .logo-icon{width:75px;height:75px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px}
        h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#F7931A,#FFD166);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:16px}
        p{color:#8E94B3;margin-bottom:32px}
        .btn-signin{background:linear-gradient(135deg,#F7931A,#FF6B00);border:none;padding:14px 32px;border-radius:60px;font-weight:700;color:#05070A;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px}
        .error-message{background:rgba(255,68,68,.1);border-left:3px solid #FF4444;padding:12px;border-radius:16px;color:#FF6B6B;margin-top:20px}
        .loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(247,147,26,.3);border-radius:50%;border-top-color:#F7931A;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="confirm-card">
    <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
    
    <div id="successContent" style="display:none">
        <h1>✅ Email Confirmed!</h1>
        <p>Your email has been verified. You can now sign in.</p>
        <button onclick="location.href='auth.html'" class="btn-signin">Sign In <i class="fas fa-arrow-right"></i></button>
    </div>
    
    <div id="errorContent" style="display:none">
        <h1 style="background:linear-gradient(135deg,#FF6B6B,#FF4444);-webkit-background-clip:text;background-clip:text;color:transparent">Verification Failed</h1>
        <div class="error-message" id="errorMsg"></div>
        <button onclick="location.href='auth.html'" class="btn-signin" style="margin-top:20px">Back to Sign In</button>
    </div>
    
    <div id="loadingContent">
        <div class="loading-spinner"></div>
        <p style="margin-top:20px">Verifying your email...</p>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function handleConfirmation() {
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const queryParams = new URLSearchParams(window.location.search);
    
    const accessToken = hashParams.get('access_token') || queryParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token') || queryParams.get('refresh_token');
    
    if (!accessToken) {
        document.getElementById('loadingContent').style.display = 'none';
        document.getElementById('errorContent').style.display = 'block';
        document.getElementById('errorMsg').innerText = 'Invalid confirmation link.';
        return;
    }
    
    try {
        const { error } = await supabase.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
        });
        
        if (error) throw error;
        
        document.getElementById('loadingContent').style.display = 'none';
        document.getElementById('successContent').style.display = 'block';
        
    } catch (error) {
        document.getElementById('loadingContent').style.display = 'none';
        document.getElementById('errorContent').style.display = 'block';
        document.getElementById('errorMsg').innerText = error.message || 'Verification failed. Link may be expired.';
    }
}

handleConfirmation();
</script>
</body>
</html>
