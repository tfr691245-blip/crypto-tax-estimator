<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Email Confirmed | CryptoTax</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: #0A0C15;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0A0C15;
        }

        .bg-orb::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.12), transparent 70%);
            filter: blur(80px);
            animation: float 12s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(5%, 5%) scale(1.1); opacity: 0.8; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .confirm-container {
            max-width: 500px;
            margin: 20px;
            animation: fadeInUp 0.6s ease-out;
        }

        .confirm-card {
            background: rgba(13, 15, 23, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid rgba(247, 147, 26, 0.25);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);
            transition: all 0.4s ease;
        }

        .confirm-card:hover {
            border-color: rgba(247, 147, 26, 0.45);
            box-shadow: 0 40px 80px -20px rgba(247, 147, 26, 0.15);
        }

        @media (max-width: 550px) {
            .confirm-card {
                padding: 32px 24px;
                border-radius: 36px;
            }
        }

        .logo-icon {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            box-shadow: 0 15px 35px rgba(247, 147, 26, 0.3);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #F7931A, #FFD166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        p {
            color: #8E94B3;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .success-icon i {
            font-size: 48px;
            color: #4CAF50;
        }

        .btn-signin {
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            color: #05070A;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Outfit', sans-serif;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(247, 147, 26, 0.3);
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #FF4444;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            color: #FF6B6B;
            margin-top: 20px;
        }

        .loading {
            color: #8E94B3;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="confirm-container">
    <div class="confirm-card">
        <div class="logo-icon">
            <i class="fas fa-chart-line"></i>
        </div>
        
        <div id="successContent">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Email Confirmed! ✅</h1>
            <p>Your email address has been successfully verified.<br>You can now sign in to your CryptoTax account.</p>
            <button onclick="window.location.href='https://elite.qzz.io/auth.html'" class="btn-signin">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        
        <div id="errorContent" style="display: none;">
            <div class="success-icon" style="background: rgba(255, 68, 68, 0.1);">
                <i class="fas fa-exclamation-triangle" style="color: #FF6B6B;"></i>
            </div>
            <h1 style="background: linear-gradient(135deg, #FF6B6B, #FF4444); -webkit-background-clip: text; background-clip: text; color: transparent;">Verification Failed</h1>
            <div class="error-message" id="errorMsg"></div>
            <button onclick="window.location.href='https://elite.qzz.io/auth.html'" class="btn-signin">
                Back to Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </div>
        
        <div id="loadingContent" style="display: none;">
            <div class="loading">
                <i class="fas fa-spinner fa-pulse"></i> Verifying your email...
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const successContent = document.getElementById('successContent');
    const errorContent = document.getElementById('errorContent');
    const loadingContent = document.getElementById('loadingContent');
    const errorMsg = document.getElementById('errorMsg');

    async function handleConfirmation() {
        // Get tokens from URL hash or query params
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const queryParams = new URLSearchParams(window.location.search);
        
        const accessToken = hashParams.get('access_token') || queryParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token') || queryParams.get('refresh_token');
        
        if (!accessToken) {
            loadingContent.style.display = 'none';
            errorContent.style.display = 'block';
            errorMsg.innerText = 'Invalid confirmation link. Please request a new confirmation email.';
            return;
        }
        
        try {
            const { data, error } = await supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            });
            
            if (error) throw error;
            
            // Update user to confirmed (Supabase does this automatically)
            loadingContent.style.display = 'none';
            successContent.style.display = 'block';
            
        } catch (error) {
            console.error('Confirmation error:', error);
            loadingContent.style.display = 'none';
            errorContent.style.display = 'block';
            errorMsg.innerText = error.message || 'Failed to verify email. The link may be expired or invalid.';
        }
    }
    
    // Show loading initially
    successContent.style.display = 'none';
    errorContent.style.display = 'none';
    loadingContent.style.display = 'block';
    
    handleConfirmation();
</script>
</body>
</html>
