<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Email Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0C15}
        .confirm-card{background:rgba(13,15,23,.85);backdrop-filter:blur(20px);border-radius:48px;padding:48px 40px;text-align:center;border:1px solid rgba(247,147,26,.25);max-width:500px;margin:20px;width:100%}
        .icon-box{width:80px;height:80px;background:rgba(247,147,26,.1);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:40px;color:#F7931A}
        h2{color:#E8EDF5;font-size:28px;margin-bottom:12px}
        p{color:#8E94B3;margin-bottom:32px;line-height:1.6}
        .btn{display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:60px;color:#05070A;text-decoration:none;font-weight:700;transition:0.3s}
        #errorContent,#successContent{display:none}
        .loader{border:4px solid rgba(247,147,26,.1);border-top:4px solid #F7931A;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin:0 auto}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div class="confirm-card">
    <div id="loadingContent">
        <div class="loader"></div>
        <h2 style="margin-top:24px">Verifying Email</h2>
        <p>Please wait while we confirm your account...</p>
    </div>
    <div id="successContent">
        <div class="icon-box"><i class="fas fa-check-circle"></i></div>
        <h2>Email Confirmed!</h2>
        <p>Your account has been successfully verified. You can now access your dashboard.</p>
        <a href="dashboard.html" class="btn">Go to Dashboard</a>
    </div>
    <div id="errorContent">
        <div class="icon-box" style="color:#FF4444;background:rgba(255,68,68,.1)"><i class="fas fa-times-circle"></i></div>
        <h2>Verification Failed</h2>
        <p id="errorMsg">The link may be expired or invalid.</p>
        <a href="auth.html" class="btn">Back to Login</a>
    </div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function handleConfirmation() {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        const accessToken = hashParams.get('access_token');
        const refreshToken = hashParams.get('refresh_token');
        
        if (!accessToken) {
            document.getElementById('loadingContent').style.display = 'none';
            document.getElementById('errorContent').style.display = 'block';
            return;
        }
        
        const { error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        document.getElementById('loadingContent').style.display = 'none';
        if (error) {
            document.getElementById('errorContent').style.display = 'block';
            document.getElementById('errorMsg').innerText = error.message;
        } else {
            document.getElementById('successContent').style.display = 'block';
        }
    }
    handleConfirmation();
})();
</script>
</body>
</html>
