<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | CryptoTax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #4c1d95 100%); background-attachment: fixed; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-gradient { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
        .btn-gradient:hover { background: linear-gradient(135deg, #7c3aed, #4f46e5); transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="glass-card fixed w-full z-20 border-b border-white/10">
        <div class="container mx-auto px-5 sm:px-8 py-3.5 sm:py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl sm:text-3xl">💰</span>
                <span class="text-white font-bold text-xl sm:text-2xl tracking-tight">CryptoTax</span>
            </div>
            <div class="flex items-center gap-3 sm:gap-6">
                <a href="index.html" class="text-gray-200 hover:text-white text-sm sm:text-base font-medium transition">Home</a>
                <a href="tax-estimator.html" class="text-gray-200 hover:text-white text-sm sm:text-base font-medium transition">Estimator</a>
                <a href="airdrop-claim.html" class="bg-gradient-to-r from-purple-500 to-indigo-500 text-white px-4 sm:px-5 py-1.5 sm:py-2 rounded-full text-sm sm:text-base font-semibold shadow-lg">Claim</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-5 sm:px-8 pt-28 sm:pt-36 pb-16 sm:pb-24">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-10">
                <h1 class="text-4xl sm:text-5xl font-extrabold text-white mb-3 tracking-tight">Dashboard</h1>
                <p class="text-gray-300 text-base sm:text-lg">Connect your wallet to view your CUT token balance and past reports.</p>
            </div>

            <!-- Wallet Connection Card -->
            <div id="walletStatus" class="glass-card rounded-2xl p-6 sm:p-8 mb-8 text-center">
                <button id="connectBtn" class="btn-gradient text-white font-semibold px-8 py-3 rounded-xl shadow-lg transition-all duration-200">
                    🔌 Connect MetaMask
                </button>
            </div>

            <!-- Wallet Info (hidden until connected) -->
            <div id="walletInfo" class="hidden space-y-6">
                <div class="glass-card rounded-2xl p-6 sm:p-8">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <p class="text-gray-300 text-sm">Connected Wallet</p>
                            <p id="walletAddress" class="text-white text-lg font-mono font-semibold break-all"></p>
                        </div>
                        <div class="text-right">
                            <p class="text-gray-300 text-sm">CUT Balance</p>
                            <p id="tokenBalance" class="text-3xl font-bold text-purple-400">0 CUT</p>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-2xl p-6 sm:p-8">
                    <h2 class="text-2xl font-bold text-white mb-4">📄 Your Tax Reports</h2>
                    <div id="reportsList" class="space-y-3">
                        <p class="text-gray-300">Connect wallet to see your reports.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOKEN_CONTRACT = '0xFa27130a7A85e96B9b814045545d7Cf6e8c2E8EC';
        let provider, signer, tokenContract;
        const tokenABI = [
            'function balanceOf(address owner) view returns (uint256)',
            'function decimals() view returns (uint8)'
        ];

        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) {
                alert('Please install MetaMask!');
                return;
            }
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                const address = await signer.getAddress();
                tokenContract = new ethers.Contract(TOKEN_CONTRACT, tokenABI, provider);
                const balanceRaw = await tokenContract.balanceOf(address);
                const decimals = await tokenContract.decimals();
                const balance = ethers.formatUnits(balanceRaw, decimals);

                document.getElementById('walletAddress').innerText = address;
                document.getElementById('tokenBalance').innerHTML = `${parseFloat(balance).toLocaleString()} CUT`;
                document.getElementById('walletStatus').classList.add('hidden');
                document.getElementById('walletInfo').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert('Failed to connect wallet.');
            }
        };
    </script>
</body>
</html>
