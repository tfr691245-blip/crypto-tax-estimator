<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoTax | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #F7931A; --bg: #05070A; --card: #0D0F17; --text: #E8EDF5; --muted: #8E94B3; }
        body.light { --bg: #F5F7FF; --card: #FFFFFF; --text: #1A1F36; --muted: #6C729B; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); transition:0.3s ease; }
        .sidebar { position:fixed; left:0; top:0; bottom:0; width:280px; background:var(--card); border-right:1px solid rgba(247,147,26,0.1); padding:40px 24px; z-index:100; }
        .main-content { margin-left:280px; padding:40px 5%; min-height:100vh; }
        .logo { display:flex; align-items:center; gap:12px; text-decoration:none; margin-bottom:48px; }
        .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,#F7931A,#FF6B00); border-radius:10px; display:flex; align-items:center; justify-content:center; color:#05070A; }
        .logo-text { font-size:20px; font-weight:800; color:var(--primary); letter-spacing:1px; }
        .nav-menu { list-style:none; }
        .nav-item { margin-bottom:8px; }
        .nav-link { display:flex; align-items:center; gap:16px; padding:16px 20px; border-radius:16px; color:var(--muted); text-decoration:none; font-weight:500; transition:0.3s; }
        .nav-link.active { background:rgba(247,147,26,0.1); color:var(--primary); }
        .nav-link:hover:not(.active) { background:rgba(255,255,255,0.03); color:var(--text); }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; }
        .user-profile { display:flex; align-items:center; gap:16px; }
        .user-avatar { width:45px; height:45px; border-radius:50%; background:linear-gradient(135deg,#F7931A,#FF6B00); display:flex; align-items:center; justify-content:center; color:#05070A; font-weight:700; }
        .stat-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(240px, 1fr)); gap:24px; margin-bottom:40px; }
        .stat-card { background:var(--card); border:1px solid rgba(247,147,26,0.1); padding:32px; border-radius:32px; }
        .stat-label { color:var(--muted); font-size:14px; margin-bottom:8px; }
        .stat-value { font-size:28px; font-weight:700; font-family:'Space Grotesk',sans-serif; }
        .logout-btn { margin-top: auto; color: #ff4444; border: none; background: none; cursor: pointer; width: 100%; text-align: left; font-size: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="logo">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <span class="logo-text">CRYPTOTAX</span>
        </a>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link active"><i class="fas fa-th-large"></i> Overview</a></li>
            <li class="nav-item"><a href="tax-estimator.html" class="nav-link"><i class="fas fa-calculator"></i> Estimator</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-wallet"></i> Wallets</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Tax Reports</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <main class="main-content">
        <div class="header">
            <div>
                <h1 style="font-size:32px; font-weight:800;">Welcome Back, <span id="userName">User</span></h1>
                <p style="color:var(--muted);">Here's your crypto tax overview for 2026.</p>
            </div>
            <div class="user-profile">
                <div class="user-avatar" id="userInitial">U</div>
                <div>
                    <div style="font-weight:600;" id="userEmail">user@email.com</div>
                    <div style="font-size:12px; color:var(--primary);">Pro Member</div>
                </div>
            </div>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">Total Portfolio Value</div>
                <div class="stat-value">$142,580.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Estimated Tax Liability</div>
                <div class="stat-value" style="color:#FF4444;">$12,450.20</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Unrealized Gains</div>
                <div class="stat-value" style="color:#4CAF50;">+$45,200.00</div>
            </div>
        </div>
    </main>

    <script>
    (function() {
        const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Session check
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'auth.html';
                return;
            }
            
            const user = session.user;
            const name = user.email.split('@')[0];
            document.getElementById('userName').innerText = name.charAt(0).toUpperCase() + name.slice(1);
            document.getElementById('userEmail').innerText = user.email;
            document.getElementById('userInitial').innerText = user.email.charAt(0).toUpperCase();
        }

        checkSession();

        // Logout
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            localStorage.removeItem('cryptotax_current_user');
            window.location.href = 'index.html';
        };

        // Apply theme
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    })();
    </script>
</body>
</html>
