<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;background:#0A0C15;color:#E8EDF5}
        body.light{background:#F5F7FF;color:#1A1F36}
        .container{max-width:1200px;margin:0 auto;padding:24px}
        .navbar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:#0D0F17;border-radius:24px;margin-bottom:48px}
        body.light .navbar{background:#fff}
        .logo{display:flex;align-items:center;gap:12px;cursor:pointer}
        .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px}
        .nav-links{display:flex;gap:12px}
        .nav-link{color:#8E94B3;text-decoration:none;padding:8px 20px;border-radius:40px}
        .nav-link.active{background:linear-gradient(135deg,#F7931A,#FF6B00);color:#05070A}
        .user-info{display:flex;align-items:center;gap:12px;background:rgba(247,147,26,.1);padding:5px 16px;border-radius:60px}
        .user-avatar{width:38px;height:38px;border-radius:50%;border:2px solid #F7931A}
        .logout-btn{background:transparent;border:1px solid rgba(247,147,26,.3);color:#F7931A;padding:6px 14px;border-radius:40px;cursor:pointer}
        .welcome-section{background:linear-gradient(135deg,rgba(247,147,26,.08),rgba(255,107,0,.04));border-radius:32px;padding:40px;text-align:center;margin-bottom:32px}
        .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
        .stat-card{background:#0D0F17;border-radius:24px;padding:28px;text-align:center}
        body.light .stat-card{background:#fff}
        .stat-number{font-size:44px;font-weight:800;background:linear-gradient(135deg,#F7931A,#FF6B00);-webkit-background-clip:text;background-clip:text;color:transparent}
        .activity-card{background:#0D0F17;border-radius:24px;padding:24px}
        body.light .activity-card{background:#fff}
        .activity-title{color:#F7931A;margin-bottom:20px}
        .activity-item{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid rgba(247,147,26,.1)}
        .hidden{display:none!important}
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo" onclick="location.href='index.html'">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <h1>CRYPTOTAX</h1>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="tax-estimator.html" class="nav-link active">Estimator</a>
        </div>
        <div id="userInfo" class="user-info hidden">
            <img id="userAvatar" class="user-avatar">
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Exit</button>
        </div>
        <a href="auth.html" id="authBtn" class="nav-link">Account</a>
        <div class="theme-toggle" id="themeToggle" style="cursor:pointer"><i class="fas fa-moon"></i></div>
    </div>
    
    <div class="welcome-section">
        <h1>Welcome back, <span id="welcomeName">User</span>! 👋</h1>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalTx">0</div><div>Transactions</div></div>
        <div class="stat-card"><div class="stat-number" id="totalGainDash">$0</div><div>Total Gain</div></div>
        <div class="stat-card"><div class="stat-number" id="totalLossDash">$0</div><div>Total Loss</div></div>
        <div class="stat-card"><div class="stat-number" id="netGainDash">$0</div><div>Net Gain</div></div>
    </div>
    
    <div class="activity-card">
        <div class="activity-title"><i class="fas fa-history"></i> Recent Activity</div>
        <div id="activityList">No activity yet. Upload a CSV in Estimator.</div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') document.body.classList.add('light');
document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
};

// Auth check
supabase.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) {
        window.location.href = 'auth.html';
        return;
    }
    
    const user = session.user;
    const userName = user.email.split('@')[0];
    document.getElementById('welcomeName').innerText = userName;
    document.getElementById('userName').innerText = userName;
    document.getElementById('userAvatar').src = `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${userName}`;
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('authBtn').classList.add('hidden');
    
    localStorage.setItem('cryptotax_current_user', JSON.stringify({
        id: user.id, email: user.email, name: userName
    }));
});

// Logout
window.logout = async () => {
    await supabase.auth.signOut();
    localStorage.removeItem('cryptotax_current_user');
    window.location.href = 'index.html';
};
document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.stopPropagation(); window.logout(); });

// Load data
const txData = JSON.parse(localStorage.getItem('cryptotax_tx_data')) || { totalTx: 0, totalGain: 0, totalLoss: 0, netGain: 0, recent: [] };
document.getElementById('totalTx').innerText = txData.totalTx || 0;
document.getElementById('totalGainDash').innerHTML = `$${txData.totalGain || 0}`;
document.getElementById('totalLossDash').innerHTML = `$${txData.totalLoss || 0}`;
document.getElementById('netGainDash').innerHTML = `$${txData.netGain || 0}`;

if (txData.recent && txData.recent.length > 0) {
    document.getElementById('activityList').innerHTML = txData.recent.slice(0, 5).map(item => `
        <div class="activity-item">
            <div><i class="fas fa-file-csv"></i></div>
            <div>${item.name || 'CSV Upload'}<br><small>${item.date || ''}</small></div>
            <div>${item.netGain ? `+$${item.netGain}` : ''}</div>
        </div>
    `).join('');
}
</script>
</body>
</html>
