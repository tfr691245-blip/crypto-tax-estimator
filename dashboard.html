<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoTax | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: radial-gradient(ellipse at top, #0f172a 0%, #1e1b4b 50%, #0a0a1a 100%); background-attachment: fixed; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border-radius: 28px; border: 1px solid rgba(139, 92, 246, 0.2); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(139, 92, 246, 0.4); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        .btn-primary { background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); border-radius: 40px; padding: 12px 28px; font-weight: 600; color: white; transition: all 0.3s ease; cursor: pointer; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5); }
        .gradient-text { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    </style>
</head>
<body class="min-h-screen text-white">
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/50 backdrop-blur-xl border-b border-white/10">
        <div class="container mx-auto px-5 sm:px-8 py-4">
            <div class="flex flex-wrap items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <span class="text-2xl sm:text-3xl animate-pulse">💰</span>
                    <span class="text-white font-bold text-xl sm:text-2xl tracking-tight">CryptoTax</span>
                    <span class="hidden sm:inline-flex text-xs bg-purple-500/20 text-purple-300 px-2 py-1 rounded-full ml-2">BETA</span>
                </div>
                <div class="flex items-center gap-2 sm:gap-4">
                    <a href="index.html" class="text-gray-300 hover:text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg hover:bg-white/5">Home</a>
                    <a href="dashboard.html" class="text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg bg-purple-600/20">Dashboard</a>
                    <a href="tax-estimator.html" class="text-gray-300 hover:text-white text-sm sm:text-base transition px-3 py-1.5 rounded-lg hover:bg-white/5">Estimator</a>
                    <a href="airdrop-claim.html" class="bg-gradient-to-r from-purple-500 to-indigo-500 text-white px-4 sm:px-5 py-1.5 rounded-full text-sm font-semibold shadow-lg">Claim</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-5 sm:px-8 pt-28 sm:pt-32 pb-16">
        <div class="max-w-4xl mx-auto">
            <div class="text-center mb-10">
                <h1 class="text-5xl font-extrabold mb-3 tracking-tight">Dashboard</h1>
                <p class="text-gray-400 text-lg">View your MFC token balance</p>
            </div>

            <div class="glass-card p-8">
                <div class="flex flex-col items-center text-center">
                    <div class="w-20 h-20 bg-purple-500/20 rounded-2xl flex items-center justify-center text-4xl mb-4">💜</div>
                    <h2 class="text-2xl font-bold mb-2">MFC Token Balance</h2>
                    <p class="text-gray-400 text-sm mb-6">Polygon Amoy Testnet</p>
                    
                    <div id="walletStatus" class="w-full">
                        <button id="connectBtn" class="btn-primary">🔌 Connect MetaMask</button>
                    </div>
                    
                    <div id="walletInfo" class="hidden w-full mt-6">
                        <div class="bg-purple-500/10 rounded-xl p-6">
                            <p class="text-gray-300 text-sm">Connected Wallet</p>
                            <p id="walletAddress" class="text-white font-mono text-sm break-all"></p>
                            <div class="mt-4 pt-4 border-t border-white/10">
                                <p class="text-gray-300 text-sm">MFC Balance</p>
                                <p id="tokenBalance" class="text-4xl font-bold gradient-text">0 MFC</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOKEN_CONTRACT = '0xe7C74768e9AdF945C920967e334FFF40167A126F';
        const RPC_URL = 'https://lb.drpc.live/polygon-amoy/AlKOOugi5EgeoaJxUsJsaFsKxwDeMRwR8aGVGrar0DFx';
        
        const tokenABI = ['function balanceOf(address owner) view returns (uint256)', 'function decimals() view returns (uint8)'];
        
        let provider = new ethers.JsonRpcProvider(RPC_URL);
        let tokenContract = new ethers.Contract(TOKEN_CONTRACT, tokenABI, provider);
        
        async function fetchMFCBalance(address) {
            try {
                const balanceRaw = await tokenContract.balanceOf(address);
                const decimals = await tokenContract.decimals();
                const balance = ethers.formatUnits(balanceRaw, decimals);
                return parseFloat(balance);
            } catch (err) {
                console.error(err);
                return null;
            }
        }
        
        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) {
                alert('Please install MetaMask!');
                return;
            }
            try {
                const metamaskProvider = new ethers.BrowserProvider(window.ethereum);
                const signer = await metamaskProvider.getSigner();
                const address = await signer.getAddress();
                const balance = await fetchMFCBalance(address);
                
                document.getElementById('walletAddress').innerText = address;
                document.getElementById('tokenBalance').innerHTML = `${balance.toLocaleString()} MFC`;
                document.getElementById('walletStatus').classList.add('hidden');
                document.getElementById('walletInfo').classList.remove('hidden');
            } catch (err) {
                alert('Failed to connect: ' + err.message);
            }
        };
    </script>
</body>
</html>
