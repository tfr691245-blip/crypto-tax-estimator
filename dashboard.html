<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0A0C15;
            --bg-secondary: #0D0F17;
            --text-primary: #E8EDF5;
            --text-secondary: #8E94B3;
            --text-muted: #6C729B;
            --border-color: #1A1E2C;
            --border-light: rgba(247, 147, 26, 0.15);
            --accent: #F7931A;
            --accent-gradient: linear-gradient(135deg, #F7931A 0%, #E07C0A 100%);
        }
        body.light {
            --bg-primary: #F5F7FF;
            --bg-secondary: #FFFFFF;
            --text-primary: #1A1F36;
            --text-secondary: #4A5568;
            --text-muted: #718096;
            --border-color: #E2E8F0;
        }
        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s;
        }
        body:not(.light) .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0A0C15;
        }
        body:not(.light) .bg-orb::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.12), transparent 70%);
            filter: blur(80px);
            animation: float 12s ease-in-out infinite;
        }
        @keyframes float { 0%,100% { transform: translate(0,0) scale(1); opacity: 0.5; } 50% { transform: translate(5%,5%) scale(1.1); opacity: 0.8; } }
        .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
        @media (min-width: 768px) { .container { padding: 24px; } }
        
        .navbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--border-light);
        }
        @media (min-width: 768px) { .navbar { flex-direction: row; justify-content: space-between; padding: 16px 24px; margin-bottom: 48px; } }
        
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { width: 44px; height: 44px; background: var(--accent-gradient); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .logo-text h1 { font-size: 24px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 11px; color: var(--accent); }
        
        .nav-right { display: flex; align-items: center; gap: 16px; margin-top: 16px; flex-wrap: wrap; justify-content: center; }
        @media (min-width: 768px) { .nav-right { margin-top: 0; } }
        
        .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 40px;
        }
        .nav-link.active { background: var(--accent-gradient); color: #05070A; }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(247,147,26,0.1); padding: 5px 16px 5px 8px; border-radius: 60px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .user-name { font-size: 14px; font-weight: 600; color: var(--accent); }
        .logout-btn { background: transparent; border: 1px solid rgba(247,147,26,0.3); color: var(--accent); padding: 6px 14px; border-radius: 40px; cursor: pointer; }
        
        .theme-toggle {
            background: rgba(5,7,10,0.5);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /* Dashboard Content */
        .welcome-section {
            background: linear-gradient(135deg, rgba(247,147,26,0.1), rgba(255,107,0,0.05));
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid var(--border-light);
        }
        .welcome-section h1 { font-size: 32px; margin-bottom: 8px; }
        .welcome-section p { color: var(--text-secondary); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        @media (min-width: 768px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .stat-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .stat-number { font-size: 32px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
        
        .activity-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }
        .activity-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--accent); }
        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .activity-icon { width: 44px; height: 44px; background: rgba(247,147,26,0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .activity-detail { flex: 1; }
        .activity-name { font-weight: 600; }
        .activity-time { font-size: 11px; color: var(--text-muted); }
        
        .footer {
            margin-top: 32px;
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
        }
        @media (min-width: 768px) { .footer { flex-direction: row; justify-content: space-between; } }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="container">
    <div class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <div class="logo-text"><h1>CRYPTOTAX</h1><p>ENTERPRISE GRADE</p></div>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="tax-estimator.html" class="nav-link">Estimator</a>
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
            </div>
            <div id="userInfo" class="user-info hidden">
                <img id="userAvatar" class="user-avatar" src="">
                <span id="userName" class="user-name"></span>
                <button id="logoutBtn" class="logout-btn">Exit</button>
            </div>
            <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
        </div>
    </div>

    <div class="welcome-section" id="welcomeSection">
        <h1>Welcome back, <span id="welcomeName">User</span>! 👋</h1>
        <p>Track your crypto tax activity and portfolio performance</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalTx">0</div><div class="stat-label">Transactions</div></div>
        <div class="stat-card"><div class="stat-number" id="totalGainDash">$0</div><div class="stat-label">Total Gain</div></div>
        <div class="stat-card"><div class="stat-number" id="totalLossDash">$0</div><div class="stat-label">Total Loss</div></div>
        <div class="stat-card"><div class="stat-number" id="netGainDash">$0</div><div class="stat-label">Net Gain</div></div>
    </div>

    <div class="activity-card">
        <div class="activity-title"><i class="fas fa-history"></i> Recent Activity</div>
        <div class="activity-list" id="activityList">
            <div class="activity-item"><div class="activity-icon"><i class="fas fa-chart-line"></i></div><div class="activity-detail"><div class="activity-name">No recent activity</div><div class="activity-time">-</div></div></div>
        </div>
    </div>

    <div class="footer">
        <span><i class="fas fa-shield-alt"></i> Secure • FIFO • Real-time</span>
        <div class="footer-social"><a href="#"><i class="fab fa-twitter"></i></a><a href="#"><i class="fab fa-github"></i></a><a href="#"><i class="fab fa-discord"></i></a></div>
        <span>© 2026 CryptoTax</span>
    </div>
</div>

<script>
    const themeToggle = document.getElementById('themeToggle');
    const icon = themeToggle.querySelector('i');
    function setTheme(theme) {
        if (theme === 'light') { document.body.classList.add('light'); icon.classList.remove('fa-moon'); icon.classList.add('fa-sun'); localStorage.setItem('theme', 'light');
        } else { document.body.classList.remove('light'); icon.classList.remove('fa-sun'); icon.classList.add('fa-moon'); localStorage.setItem('theme', 'dark'); }
    }
    const savedTheme = localStorage.getItem('theme');
    savedTheme === 'light' ? setTheme('light') : setTheme('dark');
    themeToggle.addEventListener('click', () => document.body.classList.contains('light') ? setTheme('dark') : setTheme('light'));

    const currentUser = JSON.parse(localStorage.getItem('cryptotax_current_user'));
    if (!currentUser) { window.location.href = 'auth.html'; }
    
    document.getElementById('welcomeName').innerText = currentUser.name || currentUser.email.split('@')[0];
    document.getElementById('userName').innerText = currentUser.name || currentUser.email.split('@')[0];
    document.getElementById('userAvatar').src = currentUser.picture || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${currentUser.email}`;
    document.getElementById('userInfo').classList.remove('hidden');
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('cryptotax_current_user'); window.location.href = 'index.html'; };

    const txData = JSON.parse(localStorage.getItem('cryptotax_tx_data')) || { totalTx: 0, totalGain: 0, totalLoss: 0, netGain: 0, recent: [] };
    document.getElementById('totalTx').innerText = txData.totalTx || 0;
    document.getElementById('totalGainDash').innerHTML = `$${txData.totalGain || 0}`;
    document.getElementById('totalLossDash').innerHTML = `$${txData.totalLoss || 0}`;
    document.getElementById('netGainDash').innerHTML = `$${txData.netGain || 0}`;
    
    const activityList = document.getElementById('activityList');
    if (txData.recent && txData.recent.length > 0) {
        activityList.innerHTML = txData.recent.slice(0, 5).map(item => `
            <div class="activity-item">
                <div class="activity-icon"><i class="fas fa-file-csv"></i></div>
                <div class="activity-detail">
                    <div class="activity-name">${item.name || 'CSV Upload'}</div>
                    <div class="activity-time">${item.date || new Date().toLocaleString()}</div>
                </div>
                <div style="color: var(--accent);">${item.netGain ? `+$${item.netGain}` : ''}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
