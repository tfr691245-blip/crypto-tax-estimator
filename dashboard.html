<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;background:#0A0C15;color:#E8EDF5}
        .container{max-width:1200px;margin:0 auto;padding:24px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:48px}
        .logout-btn{padding:10px 20px;background:rgba(255,68,68,.1);border:1px solid #FF4444;color:#FF4444;border-radius:12px;cursor:pointer}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Dashboard</h1>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
    <div id="userInfo">Loading user...</div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function checkUser() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = 'auth.html';
            return;
        }
        document.getElementById('userInfo').innerText = `Welcome, ${session.user.email}`;
    }

    document.getElementById('logoutBtn').onclick = async () => {
        await supabase.auth.signOut();
        window.location.href = 'index.html';
    };

    checkUser();
})();
</script>
</body>
</html>
