<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: #0A0C15;
            color: #E8EDF5;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        body.light {
            background: #F5F7FF;
            color: #1A1F36;
        }

        .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0A0C15;
        }

        body.light .bg-orb { background: #F5F7FF; }

        .bg-orb::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.12), transparent 70%);
            filter: blur(80px);
            animation: float 12s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(5%, 5%) scale(1.1); opacity: 0.8; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Navigation */
        .navbar {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: rgba(13, 15, 23, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(247, 147, 26, 0.2);
        }

        body.light .navbar {
            background: rgba(255, 255, 255, 0.8);
        }

        @media (min-width: 768px) {
            .navbar {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(247, 147, 26, 0.3);
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 11px;
            color: #F7931A;
            letter-spacing: 1px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 16px;
        }

        @media (min-width: 768px) {
            .nav-right {
                margin-top: 0;
            }
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-link {
            color: #8E94B3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 40px;
            transition: all 0.3s ease;
        }

        body.light .nav-link { color: #4A5568; }
        .nav-link:hover { background: rgba(247, 147, 26, 0.1); color: #F7931A; }
        .nav-link.active { background: linear-gradient(135deg, #F7931A, #FF6B00); color: #05070A; }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(247, 147, 26, 0.1);
            padding: 5px 16px 5px 8px;
            border-radius: 60px;
        }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid #F7931A;
            object-fit: cover;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: #F7931A;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(247, 147, 26, 0.3);
            color: #F7931A;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(247, 147, 26, 0.1);
        }

        .theme-toggle {
            background: rgba(5, 7, 10, 0.5);
            border: 1px solid #2A2F4F;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.light .theme-toggle {
            background: #F0F2F8;
            border-color: #E2E8F0;
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
            border-color: #F7931A;
        }

        .theme-toggle i {
            font-size: 20px;
            color: #F7931A;
            transition: transform 0.5s ease;
        }

        body.light .theme-toggle i {
            transform: rotate(360deg);
        }

        /* Dashboard Content */
        .welcome-section {
            background: linear-gradient(135deg, rgba(247, 147, 26, 0.08), rgba(255, 107, 0, 0.04));
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 32px;
            text-align: center;
            border: 1px solid rgba(247, 147, 26, 0.15);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-section h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .welcome-section p {
            color: #8E94B3;
            font-size: 15px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            background: rgba(13, 15, 23, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 28px 20px;
            text-align: center;
            border: 1px solid rgba(247, 147, 26, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: rgba(247, 147, 26, 0.3);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #F7931A, #FFD166);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Space Grotesk', monospace;
        }

        @media (min-width: 768px) {
            .stat-number {
                font-size: 44px;
            }
        }

        .stat-label {
            font-size: 13px;
            color: #8E94B3;
            margin-top: 8px;
        }

        /* Activity Card */
        .activity-card {
            background: rgba(13, 15, 23, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(247, 147, 26, 0.1);
            margin-bottom: 32px;
        }

        .activity-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #F7931A;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .activity-list {
            list-style: none;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid rgba(247, 147, 26, 0.1);
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            background: rgba(247, 147, 26, 0.02);
            padding-left: 8px;
        }

        .activity-icon {
            width: 44px;
            height: 44px;
            background: rgba(247, 147, 26, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #F7931A;
        }

        .activity-detail {
            flex: 1;
        }

        .activity-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 11px;
            color: #6C729B;
        }

        .activity-amount {
            font-weight: 700;
            color: #4CAF50;
        }

        /* Footer */
        .footer {
            padding: 20px 24px;
            background: rgba(13, 15, 23, 0.5);
            border-radius: 24px;
            border: 1px solid rgba(247, 147, 26, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: #6C729B;
            text-align: center;
        }

        @media (min-width: 768px) {
            .footer {
                flex-direction: row;
                justify-content: space-between;
            }
        }

        .footer-social {
            display: flex;
            gap: 20px;
        }

        .footer-social a {
            color: #6C729B;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .footer-social a:hover {
            color: #F7931A;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
<div class="bg-orb"></div>
<div class="container">
    <!-- Navigation -->
    <div class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
            <div class="logo-text">
                <h1>CRYPTOTAX</h1>
                <p>ENTERPRISE GRADE</p>
            </div>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="tax-estimator.html" class="nav-link">Estimator</a>
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
            </div>
            <div id="userInfo" class="user-info">
                <img id="userAvatar" class="user-avatar" src="">
                <span id="userName" class="user-name"></span>
                <button id="logoutBtn" class="logout-btn">Exit</button>
            </div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </div>
        </div>
    </div>

    <!-- Welcome Section -->
    <div class="welcome-section">
        <h1>Welcome back, <span id="welcomeName">User</span>! 👋</h1>
        <p>Track your crypto tax activity and portfolio performance</p>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="totalTx">0</div>
            <div class="stat-label">Total Transactions</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalGainDash">$0</div>
            <div class="stat-label">Total Gain</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="totalLossDash">$0</div>
            <div class="stat-label">Total Loss</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="netGainDash">$0</div>
            <div class="stat-label">Net Gain</div>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="activity-card">
        <div class="activity-title">
            <i class="fas fa-history"></i> Recent Activity
        </div>
        <div class="activity-list" id="activityList">
            <div class="activity-item">
                <div class="activity-icon"><i class="fas fa-chart-line"></i></div>
                <div class="activity-detail">
                    <div class="activity-name">No recent activity</div>
                    <div class="activity-time">-</div>
                </div>
                <div class="activity-amount"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span><i class="fas fa-shield-alt"></i> Secure • FIFO • Real-time</span>
        <div class="footer-social">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-discord"></i></a>
        </div>
        <span>© 2026 CryptoTax</span>
    </div>
</div>

<script>
    // ============ SUPABASE CONFIGURATION ============
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============ THEME TOGGLE ============
    const themeToggle = document.getElementById('themeToggle');
    const icon = themeToggle.querySelector('i');
    
    function setTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light');
            icon.classList.remove('fa-moon');
            icon.classList.add('fa-sun');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            icon.classList.remove('fa-sun');
            icon.classList.add('fa-moon');
            localStorage.setItem('theme', 'dark');
        }
    }
    
    const savedTheme = localStorage.getItem('theme');
    savedTheme === 'light' ? setTheme('light') : setTheme('dark');
    
    themeToggle.addEventListener('click', () => {
        document.body.classList.contains('light') ? setTheme('dark') : setTheme('light');
    });

    // ============ USER AUTHENTICATION ============
    async function loadUser() {
        const { data: { user }, error } = await supabase.auth.getUser();
        
        if (error || !user) {
            window.location.href = 'https://elite.qzz.io/auth.html';
            return;
        }
        
        const userName = user.user_metadata?.full_name || user.email.split('@')[0];
        const userAvatar = user.user_metadata?.avatar_url || `https://ui-avatars.com/api/?background=F7931A&color=fff&name=${user.email}`;
        
        document.getElementById('welcomeName').innerText = userName;
        document.getElementById('userName').innerText = userName;
        document.getElementById('userAvatar').src = userAvatar;
        
        // Load dashboard data from localStorage
        const txData = JSON.parse(localStorage.getItem('cryptotax_tx_data')) || {
            totalTx: 0,
            totalGain: 0,
            totalLoss: 0,
            netGain: 0,
            recent: []
        };
        
        document.getElementById('totalTx').innerText = txData.totalTx || 0;
        document.getElementById('totalGainDash').innerHTML = `$${txData.totalGain || 0}`;
        document.getElementById('totalLossDash').innerHTML = `$${txData.totalLoss || 0}`;
        document.getElementById('netGainDash').innerHTML = `$${txData.netGain || 0}`;
        
        const activityList = document.getElementById('activityList');
        if (txData.recent && txData.recent.length > 0) {
            activityList.innerHTML = txData.recent.slice(0, 10).map(item => `
                <div class="activity-item">
                    <div class="activity-icon"><i class="fas fa-file-csv"></i></div>
                    <div class="activity-detail">
                        <div class="activity-name">${item.name || 'CSV Upload'}</div>
                        <div class="activity-time">${item.date || new Date().toLocaleString()}</div>
                    </div>
                    <div class="activity-amount">${item.netGain ? `+$${item.netGain}` : ''}</div>
                </div>
            `).join('');
        }
    }
    
    // ============ LOGOUT ============
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        localStorage.removeItem('cryptotax_current_user');
        window.location.href = 'https://elite.qzz.io/auth.html';
    });
    
    loadUser();
</script>
</body>
</html>
