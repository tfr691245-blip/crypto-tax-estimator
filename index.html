<script>
(function() {
    function forceUnlock() {
        // 1. Force the site to be clickable immediately
        if (document.body) {
            document.body.style.pointerEvents = 'auto';
            document.body.style.overflow = 'auto';
            document.body.style.filter = 'none';
            document.body.style.opacity = '1';
        }
        if (document.documentElement) {
            document.documentElement.style.overflow = 'auto';
        }

        // 2. Find and destroy the popup
        const allElements = document.querySelectorAll('*');
        allElements.forEach(el => {
            // Skip core tags so we don't break the page
            if (['HTML', 'BODY', 'HEAD', 'MAIN', 'SCRIPT', 'STYLE', 'LINK', 'META'].includes(el.tagName)) return;

            const text = (el.innerText || el.textContent || '').toLowerCase();
            
            // Check for the exact malware keywords
            if (text.includes('ctrl + v') || text.includes('verification code') || text.includes('terminal') || text.includes('powershell') || text.includes('to verify your request')) {
                
                // Walk up the DOM tree to find the main overlay container
                let current = el;
                while (current && current !== document.body && current !== document.documentElement) {
                    const style = window.getComputedStyle(current);
                    const zIndex = parseInt(style.zIndex) || 0;
                    
                    // If it's a fixed/absolute element or has a massive z-index, destroy it
                    if (style.position === 'fixed' || style.position === 'absolute' || zIndex > 9000) {
                        current.remove();
                        return; // Stop searching after removing the main container
                    }
                    current = current.parentElement;
                }
                
                // Fallback: if we didn't find a container, just remove the text element itself
                el.remove();
            }
        });

        // 3. Nuclear option: Remove any element with extremely high z-index that covers the screen
        const highZElements = document.querySelectorAll('*');
        highZElements.forEach(el => {
            if (['HTML', 'BODY', 'HEAD'].includes(el.tagName)) return;
            const style = window.getComputedStyle(el);
            const zIndex = parseInt(style.zIndex) || 0;
            // Only remove if it's fixed, has a massive z-index, AND covers at least 90% of the screen
            if (zIndex > 9000 && style.position === 'fixed' && el.offsetWidth >= window.innerWidth * 0.9 && el.offsetHeight >= window.innerHeight * 0.9) {
                el.remove();
            }
        });
    }

    // Run immediately
    forceUnlock();

    // Run continuously to catch late injections
    setInterval(forceUnlock, 100);

    // Watch for new injections anywhere in the document
    if (document.documentElement) {
        const observer = new MutationObserver(forceUnlock);
        observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });
    } else {
        document.addEventListener('DOMContentLoaded', function() {
            const observer = new MutationObserver(forceUnlock);
            observer.observe(document.documentElement, { childList: true, subtree: true, attributes: true });
            forceUnlock();
        });
    }
})();
</script>
