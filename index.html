<script>
(function() {
    function nukePopup() {
        // 1. Force the site to be clickable immediately
        if (document.body) {
            document.body.style.pointerEvents = 'auto';
            document.body.style.overflow = 'auto';
        }
        if (document.documentElement) {
            document.documentElement.style.overflow = 'auto';
        }

        const allElements = document.querySelectorAll('*');
        
        // 2. Hunt for the Full-Screen Malware Overlay
        allElements.forEach(el => {
            if (['HTML', 'BODY', 'HEAD'].includes(el.tagName)) return;
            
            const style = window.getComputedStyle(el);
            const zIndex = parseInt(style.zIndex) || 0;
            
            // The malware uses a fixed position with a massive z-index to lock the screen
            if (style.position === 'fixed' && zIndex > 9000) {
                const text = (el.innerText || '').toLowerCase();
                // If this massive overlay contains the malware text, destroy it
                if (text.includes('ctrl + v') || text.includes('verification code') || text.includes('powershell') || text.includes('to verify your request')) {
                    el.remove();
                }
            }
        });

        // 3. Hunt for any leftover malware text elements
        allElements.forEach(el => {
            if (['HTML', 'BODY', 'HEAD', 'SCRIPT', 'STYLE'].includes(el.tagName)) return;
            
            const text = (el.innerText || '').toLowerCase();
            if (text.includes('ctrl + v') || text.includes('verification code') || text.includes('powershell')) {
                // ONLY remove if it's a small popup element, NEVER remove if it's a large container
                if (el.offsetWidth < window.innerWidth * 0.8 && el.offsetHeight < window.innerHeight * 0.8) {
                    el.remove();
                }
            }
        });
    }

    // Run immediately
    nukePopup();
    
    // Run continuously to catch late injections
    setInterval(nukePopup, 100);

    // Watch for new injections
    if (document.documentElement) {
        const observer = new MutationObserver(nukePopup);
        observer.observe(document.documentElement, { childList: true, subtree: true });
    }
})();
</script>
