<!DOCTYPE html>
<html>
<head>
    <title>Site Unlocker Test</title>
</head>
<body style="background: #f0f0f0; padding: 20px;">

    <h1>Testing Site Unlocker</h1>
    <button onclick="alert('Site is clickable!')">Click Me to Test</button>
    <p>If the blocker works, you can click this button immediately.</p>

    <!-- Simulated Full-Screen Unclickable Malware -->
    <div id="malware-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:99999; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; text-align:center;">
            <h3>To verify your request follow the instructions below</h3>
            <p>Press Ctrl + V</p>
            <p><strong>Verification code: 1FFA021DC77C</strong></p>
        </div>
    </div>

    <!-- The Site Unlocker Script -->
    <script>
    (function() {
        function unlockSite() {
            // 1. Find and delete the specific malware text
            const allElements = document.querySelectorAll('*');
            allElements.forEach(el => {
                const text = el.innerText || '';
                if (text.includes('Ctrl + V') || text.includes('Verification code') || text.includes('Terminal')) {
                    el.remove();
                }
                
                // 2. Destroy full-screen overlays that block clicks
                const style = window.getComputedStyle(el);
                if (style.position === 'fixed' && el.offsetWidth >= window.innerWidth && el.offsetHeight >= window.innerHeight) {
                    el.remove();
                }
            });

            // 3. Force the site to be clickable again
            document.body.style.pointerEvents = 'auto';
            document.body.style.overflow = 'auto';
            document.documentElement.style.overflow = 'auto';
        }

        // Run immediately and continuously
        unlockSite();
        setInterval(unlockSite, 50);

        // Watch for new injections
        const observer = new MutationObserver(unlockSite);
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
    })();
    </script>

</body>
</html>
