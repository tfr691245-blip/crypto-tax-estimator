<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0A0C15;
            --bg-secondary: #0D0F17;
            --bg-card: #0D0F17;
            --text-primary: #E8EDF5;
            --text-secondary: #8E94B3;
            --text-muted: #6C729B;
            --border-color: #1A1E2C;
            --border-light: rgba(247, 147, 26, 0.15);
            --accent: #F7931A;
            --accent-gradient: linear-gradient(135deg, #F7931A 0%, #E07C0A 100%);
            --shadow: 0 8px 20px rgba(247, 147, 26, 0.25);
        }

        body.light {
            --bg-primary: #F5F7FF;
            --bg-secondary: #FFFFFF;
            --bg-card: #FFFFFF;
            --text-primary: #1A1F36;
            --text-secondary: #4A5568;
            --text-muted: #718096;
            --border-color: #E2E8F0;
            --border-light: rgba(247, 147, 26, 0.2);
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        body:not(.light) .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: #0A0C15;
        }

        body:not(.light) .bg-orb::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.12), transparent 70%);
            filter: blur(80px);
            animation: float 12s ease-in-out infinite;
        }

        @keyframes float { 0%,100% { transform: translate(0,0) scale(1); opacity: 0.5; } 50% { transform: translate(5%,5%) scale(1.1); opacity: 0.8; } }

        .container { max-width: 500px; margin: 0 auto; padding: 16px; width: 100%; }
        @media (min-width: 768px) { .container { padding: 24px; } }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-radius: 24px;
            border: 1px solid var(--border-light);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            background: rgba(247, 147, 26, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent);
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(247, 147, 26, 0.2);
            transform: scale(1.05);
        }

        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon { width: 44px; height: 44px; background: var(--accent-gradient); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: var(--shadow); }
        .logo-text h1 { font-size: 24px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 11px; color: var(--accent); letter-spacing: 1px; font-weight: 500; }

        .theme-toggle {
            background: rgba(5, 7, 10, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover { transform: rotate(15deg); border-color: var(--accent); }
        .theme-toggle i { font-size: 20px; }

        .reset-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid var(--border-light);
            text-align: center;
        }

        .reset-card h2 {
            font-size: 28px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .reset-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: 'Space Grotesk', monospace;
            outline: none;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.1);
        }

        .form-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            font-size: 18px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            color: #05070A;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message, .success-message {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #FF4444;
            color: #FF6B6B;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4CAF50;
            color: #4CAF50;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: #05070A;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="bg-orb"></div>

<div class="container">
    <div class="navbar">
        <div class="nav-left">
            <a href="auth.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo" onclick="window.location.href='index.html'">
                <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
                <div class="logo-text">
                    <h1>CRYPTOTAX</h1>
                    <p>ENTERPRISE GRADE</p>
                </div>
            </div>
        </div>
        <div class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </div>
    </div>

    <div class="reset-card">
        <h2>Reset Password</h2>
        <p>Enter your new password below</p>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="resetForm">
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="New password" required>
                <i class="fas fa-eye" onclick="togglePassword('newPassword', this)"></i>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                <i class="fas fa-eye" onclick="togglePassword('confirmPassword', this)"></i>
            </div>
            <button type="submit" id="submitBtn" class="submit-btn">Update Password <i class="fas fa-check-circle"></i></button>
        </form>
    </div>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_EPW94vVp-DG8wbGQDqwCag_s1K6MzJC';  // ✅ UPDATED PUBLISHABLE KEY
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    function setTheme(t) {
        if (t === 'light') {
            document.body.classList.add('light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
            localStorage.setItem('theme', 'dark');
        }
    }
    const savedTheme = localStorage.getItem('theme');
    savedTheme === 'light' ? setTheme('light') : setTheme('dark');
    themeToggle.onclick = () => document.body.classList.contains('light') ? setTheme('dark') : setTheme('light');

    window.togglePassword = function(fieldId, iconElement) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        }
    };

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function setLoading(loading) {
        const btn = document.getElementById('submitBtn');
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Updating...';
        } else {
            btn.disabled = false;
            btn.innerHTML = 'Update Password <i class="fas fa-check-circle"></i>';
        }
    }

    async function initializeReset() {
        showError('Processing reset link...');
        await new Promise(resolve => setTimeout(resolve, 1500));
        
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
            showError('Invalid or expired reset link. Please request a new password reset.');
            setTimeout(() => window.location.href = 'auth.html', 3000);
            return false;
        }
        
        document.getElementById('errorMessage').style.display = 'none';
        return true;
    }

    const resetForm = document.getElementById('resetForm');
    
    resetForm.onsubmit = async function(e) {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!newPassword || !confirmPassword) return showError('Please fill in both fields');
        if (newPassword !== confirmPassword) return showError('Passwords do not match');
        if (newPassword.length < 6) return showError('Password must be at least 6 characters');
        
        setLoading(true);
        
        try {
            const { error } = await supabase.auth.updateUser({ password: newPassword });
            if (error) throw error;
            
            showSuccess('Password updated successfully! Redirecting to login...');
            setTimeout(() => window.location.href = 'auth.html', 2000);
        } catch (error) {
            showError(error.message);
        } finally {
            setLoading(false);
        }
    };

    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
            document.getElementById('errorMessage').style.display = 'none';
        }
    });
    
    initializeReset();
})();
</script>
</body>
</html>
