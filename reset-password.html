<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0C15}
        .reset-card{background:rgba(13,15,23,.85);backdrop-filter:blur(20px);border-radius:48px;padding:48px 40px;text-align:center;border:1px solid rgba(247,147,26,.25);max-width:460px;width:100%;margin:20px}
        h2{color:#E8EDF5;font-size:28px;margin-bottom:12px}
        p{color:#8E94B3;margin-bottom:32px;font-size:14px}
        .form-group{margin-bottom:20px;position:relative;text-align:left}
        .form-group input{width:100%;padding:16px 20px;background:rgba(5,7,10,.6);border:1.5px solid rgba(247,147,26,.15);border-radius:20px;color:#E8EDF5;outline:none}
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#F7931A,#FF6B00);border:none;border-radius:60px;font-weight:700;cursor:pointer}
        .error-message,.success-message{padding:12px;border-radius:16px;font-size:12px;margin-bottom:20px;display:none}
        .error-message{background:rgba(255,68,68,.1);color:#FF6B6B}
        .success-message{background:rgba(76,175,80,.1);color:#4CAF50}
    </style>
</head>
<body>
<div class="reset-card">
    <h2>Set New Password</h2>
    <p>Enter your new password below to regain access.</p>
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    <form id="resetForm">
        <div class="form-group"><input type="password" id="newPassword" placeholder="New Password" required></div>
        <div class="form-group"><input type="password" id="confirmPassword" placeholder="Confirm New Password" required></div>
        <button type="submit" class="submit-btn">Update Password</button>
    </form>
</div>

<script>
(function() {
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('resetForm').onsubmit = async (e) => {
        e.preventDefault();
        const pwd = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (pwd !== confirm) return alert("Passwords match failed");
        
        const { error } = await supabase.auth.updateUser({ password: pwd });
        if (error) alert(error.message);
        else {
            alert("Success!");
            window.location.href = 'auth.html';
        }
    };
})();
</script>
</body>
</html>
