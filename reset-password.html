<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>CryptoTax | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        * { -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            background: #0A0C15;
            transition: background 0.3s ease;
        }

        body:not(.light) { background: #0A0C15; }
        body:not(.light) .reset-card { background: rgba(13, 15, 23, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(247, 147, 26, 0.25); }

        body.light { background: #F5F7FF; }
        body.light .reset-card { background: rgba(255, 255, 255, 0.95); border-color: rgba(247, 147, 26, 0.3); }
        body.light .form-group input { background: rgba(0, 0, 0, 0.03); color: #1A1F36; border-color: rgba(247, 147, 26, 0.2); }
        body.light .logo p { color: #6C729B; }

        .bg-orb {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-orb::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.12), transparent 70%);
            filter: blur(80px);
            animation: float 12s ease-in-out infinite;
        }

        .bg-orb::after {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 20%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(247, 147, 26, 0.08), transparent 70%);
            filter: blur(80px);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            50% { transform: translate(5%, 5%) scale(1.1); opacity: 0.8; }
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: transparent;
        }

        .back-btn {
            background: rgba(13, 15, 23, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(247, 147, 26, 0.3);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #F7931A;
            font-size: 24px;
            text-decoration: none;
        }

        body.light .back-btn { background: rgba(255, 255, 255, 0.8); }
        .back-btn:hover { transform: scale(1.05); border-color: #F7931A; }

        .theme-toggle {
            background: rgba(13, 15, 23, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(247, 147, 26, 0.3);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.light .theme-toggle { background: rgba(255, 255, 255, 0.8); }
        .theme-toggle:hover { transform: rotate(15deg); border-color: #F7931A; }
        .theme-toggle i, .back-btn i { font-size: 22px; color: #F7931A; }
        body.light .theme-toggle i { transform: rotate(360deg); }

        .reset-container {
            width: 100%;
            max-width: 460px;
            margin: 20px;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.4, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reset-card {
            border-radius: 48px;
            padding: 48px 40px;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6);
            transition: all 0.4s ease;
            text-align: center;
        }

        @media (max-width: 550px) {
            .reset-card { padding: 32px 24px; border-radius: 36px; }
            .top-bar { padding: 16px 20px; }
            .back-btn, .theme-toggle { width: 42px; height: 42px; }
            .back-btn i, .theme-toggle i { font-size: 18px; }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .logo-icon {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
            box-shadow: 0 15px 35px rgba(247, 147, 26, 0.3);
            transition: transform 0.3s ease;
        }

        .logo-icon:hover { transform: scale(1.03); }
        .logo h2 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #F7931A, #FFD166); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 12px; color: #8E94B3; margin-top: 6px; }

        .reset-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .reset-subtitle {
            font-size: 14px;
            color: #8E94B3;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(5, 7, 10, 0.6);
            border: 1.5px solid rgba(247, 147, 26, 0.15);
            border-radius: 20px;
            font-size: 14px;
            color: #E8EDF5;
            font-family: 'Space Grotesk', monospace;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #F7931A;
            box-shadow: 0 0 0 3px rgba(247, 147, 26, 0.1);
            transform: translateX(3px);
            outline: 2px solid rgba(247, 147, 26, 0.2);
        }

        .form-group input::placeholder { color: #4A5568; }

        .form-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #F7931A;
            font-size: 18px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #F7931A, #FF6B00);
            border: none;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 700;
            color: #05070A;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            margin-top: 12px;
        }

        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message,
        .success-message {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #FF4444;
            color: #FF6B6B;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4CAF50;
            color: #4CAF50;
        }

        .hidden { display: none; }

        @media (max-width: 550px) {
            .submit-btn { min-height: 48px; }
            .form-group input { font-size: 16px; }
            .reset-title { font-size: 20px; }
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: #05070A;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="bg-orb"></div>

<div class="top-bar">
    <a href="auth.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
    </a>
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>
</div>

<div class="reset-container">
    <div class="reset-card">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <h2>CRYPTOTAX</h2>
            <p>Enterprise Authentication Portal</p>
        </div>

        <div class="reset-title">Reset Password</div>
        <div class="reset-subtitle">Enter your new password below</div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="resetForm">
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="New password" required>
                <i class="fas fa-eye" onclick="togglePassword('newPassword', this)"></i>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                <i class="fas fa-eye" onclick="togglePassword('confirmPassword', this)"></i>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Update Password <i class="fas fa-check-circle"></i></button>
        </form>
    </div>
</div>

<script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    
    function setTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light');
            themeIcon.classList.remove('fa-moon');
            themeIcon.classList.add('fa-sun');
            localStorage.setItem('theme', 'light');
        } else {
            document.body.classList.remove('light');
            themeIcon.classList.remove('fa-sun');
            themeIcon.classList.add('fa-moon');
            localStorage.setItem('theme', 'dark');
        }
    }
    
    const savedTheme = localStorage.getItem('theme');
    savedTheme === 'light' ? setTheme('light') : setTheme('dark');
    
    themeToggle.addEventListener('click', function() {
        document.body.classList.contains('light') ? setTheme('dark') : setTheme('light');
    });

    // Password Toggle
    window.togglePassword = function(fieldId, iconElement) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        }
    };

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 5000);
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function() { el.style.display = 'none'; }, 5000);
    }

    function setLoading(loading) {
        const btn = document.getElementById('submitBtn');
        if (loading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Updating...';
        } else {
            btn.disabled = false;
            btn.innerHTML = 'Update Password <i class="fas fa-check-circle"></i>';
        }
    }

    // Reset Password
    const resetForm = document.getElementById('resetForm');
    
    resetForm.onsubmit = async function(e) {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (!newPassword || !confirmPassword) {
            return showError('Please fill in both fields');
        }
        
        if (newPassword !== confirmPassword) {
            return showError('Passwords do not match');
        }
        
        if (newPassword.length < 6) {
            return showError('Password must be at least 6 characters');
        }
        
        setLoading(true);
        
        try {
            const { data, error } = await supabase.auth.updateUser({
                password: newPassword
            });
            
            if (error) throw error;
            
            showSuccess('Password updated successfully! Redirecting to login...');
            
            setTimeout(function() {
                window.location.href = 'auth.html';
            }, 2000);
            
        } catch (error) {
            showError(error.message);
        } finally {
            setLoading(false);
        }
    };

    // Fixed: Check session after hash is processed
    const checkSession = async function() {
        // Wait for Supabase to process the URL hash
        await new Promise(resolve => setTimeout(resolve, 500));
        
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            showError('Invalid or expired reset link. Please request a new password reset.');
            setTimeout(function() {
                window.location.href = 'auth.html';
            }, 3000);
        }
    };
    
    // Listen for auth state changes
    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
            console.log('Password recovery session established');
        }
    });
    
    checkSession();
</script>
</body>
</html>
