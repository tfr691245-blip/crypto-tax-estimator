<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Space Grotesk',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0C15}
        body.light{background:#F5F7FF}
        .reset-card{background:rgba(13,15,23,.85);backdrop-filter:blur(20px);border-radius:48px;padding:48px 40px;text-align:center;border:1px solid rgba(247,147,26,.25);max-width:460px;margin:20px}
        body.light .reset-card{background:rgba(255,255,255,.95)}
        .logo-icon{width:75px;height:75px;background:linear-gradient(135deg,#F7931A,#FF6B00);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px}
        .logo h2{font-size:28px;font-weight:800;background:linear-gradient(135deg,#F7931A,#FFD166);-webkit-background-clip:text;background-clip:text;color:transparent}
        .form-group{margin-bottom:20px;position:relative}
        .form-group input{width:100%;padding:16px 20px;background:rgba(5,7,10,.6);border:1.5px solid rgba(247,147,26,.15);border-radius:20px;color:#E8EDF5}
        body.light .form-group input{background:rgba(0,0,0,.03);color:#1A1F36}
        .form-group input:focus{border-color:#F7931A;outline:none}
        .form-group i{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#F7931A;cursor:pointer}
        .submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#F7931A,#FF6B00);border:none;border-radius:60px;font-weight:700;color:#05070A;cursor:pointer}
        .error-message,.success-message{padding:12px;border-radius:16px;font-size:12px;margin-bottom:20px;display:none}
        .error-message{background:rgba(255,68,68,.1);border-left:3px solid #FF4444;color:#FF6B6B}
        .success-message{background:rgba(76,175,80,.1);border-left:3px solid #4CAF50;color:#4CAF50}
        .top-bar{position:fixed;top:0;left:0;right:0;padding:20px;display:flex;justify-content:space-between}
        .back-btn,.theme-toggle{width:48px;height:48px;background:rgba(13,15,23,.6);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(247,147,26,.3);color:#F7931A}
    </style>
</head>
<body>
<div class="top-bar">
    <a href="auth.html" class="back-btn" style="text-decoration:none"><i class="fas fa-arrow-left"></i></a>
    <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
</div>

<div class="reset-card">
    <div class="logo" style="cursor:pointer" onclick="location.href='index.html'">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <h2>CRYPTOTAX</h2>
        <p style="color:#8E94B3;font-size:12px">Reset Password</p>
    </div>
    
    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>
    
    <form id="resetForm">
        <div class="form-group">
            <input type="password" id="newPassword" placeholder="New password" required>
            <i class="fas fa-eye" onclick="togglePassword('newPassword',this)"></i>
        </div>
        <div class="form-group">
            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            <i class="fas fa-eye" onclick="togglePassword('confirmPassword',this)"></i>
        </div>
        <button type="submit" class="submit-btn">Update Password</button>
    </form>
</div>

<script>
const SUPABASE_URL = 'https://ihtazaanlobowggooghy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlodGF6YWFubG9ib3dnZ29vZ2h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjI2NTIsImV4cCI6MjA5MTIzODY1Mn0.fFKUYOkVEkciFmNjp1oEffzPsAXroApks0fQgCoE_oY';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'light') document.body.classList.add('light');
document.getElementById('themeToggle').onclick = () => {
    document.body.classList.toggle('light');
    localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
};

window.togglePassword = function(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
};

function showError(msg) {
    const el = document.getElementById('errorMessage');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
}

function showSuccess(msg) {
    const el = document.getElementById('successMessage');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 5000);
}

document.getElementById('resetForm').onsubmit = async (e) => {
    e.preventDefault();
    
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (!newPassword || !confirmPassword) return showError('Please fill both fields');
    if (newPassword !== confirmPassword) return showError('Passwords do not match');
    if (newPassword.length < 6) return showError('Password must be at least 6 characters');
    
    const { error } = await supabase.auth.updateUser({ password: newPassword });
    
    if (error) return showError(error.message);
    
    showSuccess('Password updated! Redirecting...');
    setTimeout(() => window.location.href = 'auth.html', 2000);
};

// Check for valid reset session
setTimeout(async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        showError('Invalid or expired reset link. Redirecting...');
        setTimeout(() => window.location.href = 'auth.html', 3000);
    }
}, 500);
</script>
</body>
</html>
