<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYPTOTAX | Nexus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c15;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            background: #0f111a;
            border-radius: 24px;
            padding: 28px 32px;
            max-width: 880px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
        }

        .header .sub {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }

        .network-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 28px 0 24px 0;
        }

        .network-item {
            background: #131722;
            border-radius: 14px;
            padding: 12px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid #1e2538;
        }

        .coin-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: contain;
        }

        .network-name {
            font-size: 13px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .micro-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            margin-left: 6px;
            vertical-align: middle;
        }

        .address-section {
            margin: 20px 0 18px 0;
        }

        .address-label {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 8px;
            display: block;
        }

        .address-input {
            width: 100%;
            background: #0b0e14;
            border: 1px solid #1e2538;
            border-radius: 14px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .action-options {
            display: flex;
            gap: 24px;
            margin: 16px 0 24px 0;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #2a3348;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 13px;
            color: #cbd5e1;
            cursor: pointer;
        }

        .recent-section {
            border-top: 1px solid #1a1f2e;
            padding-top: 20px;
            margin-top: 8px;
        }

        .recent-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .tx-hash {
            font-family: monospace;
            font-size: 14px;
            color: #60a5fa;
            background: #0b0e14;
            display: inline-block;
            padding: 8px 14px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>CRYPTOTAX | Nexus</h1>
            <div class="sub">Enterprise Multi-Chain Tax Platform</div>
        </div>

        <div class="network-grid">
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/matic.png" alt="Polygon">
                <span class="network-name">Polygon PoS<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/avax.png" alt="Avalanche">
                <span class="network-name">Avalanche C-Chain<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/arb.png" alt="Arbitrum">
                <span class="network-name">Arbitrum One<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/op.png" alt="Optimism">
                <span class="network-name">Optimism Mainnet<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/base.png" alt="Base">
                <span class="network-name">Base Mainnet<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/ftm.png" alt="Fantom">
                <span class="network-name">Fantom Opera<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/cro.png" alt="Cronos">
                <span class="network-name">Cronos Mainnet<span class="micro-dot"></span></span>
            </div>
            <div class="network-item">
                <img class="coin-circle" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/icon/gno.png" alt="Gnosis">
                <span class="network-name">Gnosis Chain<span class="micro-dot"></span></span>
            </div>
        </div>

        <div class="address-section">
            <div class="address-label">Enter Base address</div>
            <input type="text" class="address-input" placeholder="0x...">
        </div>

        <div class="action-options">
            <button class="action-btn">📁 CSV Import</button>
            <button class="action-btn">⚡ Balance Check</button>
        </div>

        <div class="recent-section">
            <div class="recent-title">RECENT TRANSACTION</div>
            <div class="tx-hash">0x7b3c8d9e2a1f4b5c6d7e8f9a0b1c2d3e4f5a6b7c</div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.action-btn')[0].onclick = () => alert('CSV Import');
        document.querySelectorAll('.action-btn')[1].onclick = () => alert('Balance Check');
    </script>
</body>
</html>
