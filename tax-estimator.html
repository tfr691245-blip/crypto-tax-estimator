<div id="walletMode" class="glass-card p-6 sm:p-8 hidden">
    <div class="text-center mb-6">
        <div class="w-16 h-16 bg-purple-500/20 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-3">🔗</div>
        <h2 class="text-2xl font-bold">Enter Wallet Address</h2>
        <p class="text-gray-400 text-sm mt-1">Fetch real-time balance and transaction history</p>
    </div>
    
    <div class="relative z-50"> 
        <div class="network-selector-wrapper">
            <label class="block text-sm text-gray-400 mb-2">Select Blockchain</label>
            <div class="relative">
                <div id="networkTrigger" class="network-trigger relative z-10">
                    <img id="selectedNetworkIcon" class="network-icon-img" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png" alt="BNB">
                    <span id="selectedNetworkName" class="font-medium">BNB Chain</span>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
                
                <div id="networkDropdown" class="network-dropdown !z-[9999] pointer-events-none opacity-0">
                    <div class="network-option" data-chain="bnb" data-name="BNB Chain" data-icon="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png">
                        <img class="network-icon-img" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png">
                        <div><div class="network-name">BNB Chain</div><div class="network-desc">Binance Smart Chain</div></div>
                    </div>
                    <div class="network-option" data-chain="btc" data-name="Bitcoin" data-icon="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/btc.png">
                        <img class="network-icon-img" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/btc.png">
                        <div><div class="network-name">Bitcoin</div><div class="network-desc">Bitcoin Mainnet</div></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-4 mb-4">
            <label class="block text-sm text-gray-400 mb-2">Wallet Address</label>
            <input type="text" id="walletAddress" class="address-input" placeholder="Enter wallet address">
        </div>
    </div>

    <button id="fetchWalletBtn" class="btn-primary w-full relative z-10"><span>🔍</span> Fetch Balance & Transactions</button>
</div>

<style>
    .network-dropdown.show {
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important; /* Re-enable clicks when shown */
        transform: translateY(0);
    }
</style>
