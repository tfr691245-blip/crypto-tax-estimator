<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoTax | Tax Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #F7931A; --bg: #0A0C15; --card: #131622; --text: #E8EDF5; --muted: #8E94B3; }
        body.light { --bg: #F5F7FF; --card: #FFFFFF; --text: #1A1F36; --muted: #6C729B; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .estimator-card { background:var(--card); border-radius:40px; padding:48px; border:1px solid rgba(247,147,26,0.2); width:100%; max-width:600px; }
        h1 { font-family:'Space Grotesk',sans-serif; font-size:32px; margin-bottom:32px; text-align:center; background:linear-gradient(135deg,#F7931A,#FFD166); -webkit-background-clip:text; color:transparent; }
        .input-group { margin-bottom:24px; }
        .input-group label { display:block; margin-bottom:10px; color:var(--muted); font-size:14px; font-weight:500; }
        .input-group input, .input-group select { width:100%; padding:16px 20px; border-radius:16px; background:rgba(0,0,0,0.2); border:1.5px solid rgba(247,147,26,0.1); color:var(--text); font-family:'Space Grotesk',sans-serif; outline:none; }
        .input-group input:focus { border-color:var(--primary); }
        .result-box { margin-top:32px; padding:24px; border-radius:24px; background:rgba(247,147,26,0.05); border:1px dashed var(--primary); display:none; }
        .calculate-btn { width:100%; padding:18px; border-radius:60px; background:linear-gradient(135deg,#F7931A,#FF6B00); border:none; color:#05070A; font-weight:800; font-size:18px; cursor:pointer; transition:0.3s; }
        .back-link { display:block; text-align:center; margin-top:24px; color:var(--muted); text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
    <div class="estimator-card">
        <h1>Tax Estimator</h1>
        <div class="input-group">
            <label>Total Capital Gains ($)</label>
            <input type="number" id="gains" placeholder="e.g. 50000">
        </div>
        <div class="input-group">
            <label>Annual Income ($)</label>
            <input type="number" id="income" placeholder="e.g. 75000">
        </div>
        <div class="input-group">
            <label>Holding Period</label>
            <select id="holding">
                <option value="short">Short Term (< 1 Year)</option>
                <option value="long">Long Term (> 1 Year)</option>
            </select>
        </div>
        <button class="calculate-btn" id="calcBtn">Estimate Tax Liability</button>
        
        <div class="result-box" id="resultBox">
            <div style="font-size:14px; color:var(--muted);">Estimated Tax Owed:</div>
            <div id="taxResult" style="font-size:32px; font-weight:800; color:var(--primary); margin-top:4px;">$0.00</div>
            <div style="font-size:12px; margin-top:12px; color:var(--muted);">*Based on standard US federal tax brackets.</div>
        </div>
        
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>

    <script>
        document.getElementById('calcBtn').onclick = function() {
            const gains = parseFloat(document.getElementById('gains').value) || 0;
            const holding = document.getElementById('holding').value;
            let taxRate = holding === 'long' ? 0.15 : 0.24; // Simple estimation
            
            const result = gains * taxRate;
            
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('taxResult').innerText = '$' + result.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        };

        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
    </script>
</body>
</html>
