<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoTax | Enterprise Tax Estimator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0C15;
            color: #E8EDF5;
            line-height: 1.5;
        }

        /* Professional Layout */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header - Yellow Modern Style */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 24px;
            background: linear-gradient(135deg, #0D0F17 0%, #0A0C15 100%);
            border-radius: 24px;
            border: 1px solid rgba(247, 147, 26, 0.2);
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-section h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #F7931A 0%, #FFD166 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-section p {
            font-size: 13px;
            color: #F7931A;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .version-badge {
            background: rgba(247, 147, 26, 0.12);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            color: #F7931A;
            font-weight: 500;
            border: 1px solid rgba(247, 147, 26, 0.25);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Left Panel - Blockchain Selection */
        .left-panel {
            background: #0D0F17;
            border-radius: 24px;
            border: 1px solid #1A1E2C;
            overflow: hidden;
        }

        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #1A1E2C;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #F7931A;
            background: #090B12;
        }

        .blockchain-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .blockchain-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #1A1E2C;
            position: relative;
        }

        .blockchain-item:hover {
            background: #131725;
        }

        .blockchain-item.active {
            background: linear-gradient(90deg, #1A2038 0%, #0D0F17 100%);
            border-left: 3px solid #F7931A;
        }

        /* FIXED: Circle shape for all images */
        .chain-icon-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #1A1E2C;
            padding: 4px;
        }

        .chain-icon-placeholder {
            width: 36px;
            height: 36px;
            background: #1A1E2C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chain-info {
            flex: 1;
        }

        .chain-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chain-network {
            font-size: 11px;
            color: #6C729B;
            margin-top: 2px;
        }

        .chain-balance-small {
            font-size: 13px;
            font-family: monospace;
            color: #F7931A;
        }

        /* Right Panel */
        .right-panel {
            background: #0D0F17;
            border-radius: 24px;
            border: 1px solid #1A1E2C;
            overflow: hidden;
        }

        /* Wallet Section - Yellow Accent */
        .wallet-section {
            padding: 28px;
            border-bottom: 1px solid #1A1E2C;
            background: linear-gradient(135deg, #0A0C15 0%, #0D0F17 100%);
        }

        .wallet-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #F7931A;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .balance-display {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .balance-number {
            font-size: 52px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #FFFFFF 0%, #F7931A 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .balance-symbol {
            font-size: 24px;
            font-weight: 500;
            color: #F7931A;
        }

        .balance-usd {
            font-size: 18px;
            color: #6C729B;
            margin-left: auto;
        }

        .address-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .address-input {
            flex: 1;
            background: #05070A;
            border: 1px solid #2A2F4F;
            border-radius: 14px;
            padding: 14px 18px;
            color: #E8EDF5;
            font-family: monospace;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .address-input:focus {
            border-color: #F7931A;
            box-shadow: 0 0 0 2px rgba(247, 147, 26, 0.1);
        }

        .fetch-btn {
            background: linear-gradient(135deg, #F7931A 0%, #E07C0A 100%);
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            color: #05070A;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fetch-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(247, 147, 26, 0.3);
        }

        .fetch-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .address-note {
            font-size: 12px;
            color: #F7931A;
            font-family: monospace;
            background: rgba(247, 147, 26, 0.05);
            padding: 8px 12px;
            border-radius: 10px;
            display: inline-block;
        }

        /* Transaction Table */
        .transactions-section {
            padding: 24px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #F7931A;
        }

        .tx-table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }

        .tx-table th {
            text-align: left;
            padding: 12px 8px;
            color: #6C729B;
            font-weight: 500;
            border-bottom: 1px solid #1A1E2C;
        }

        .tx-table td {
            padding: 12px 8px;
            border-bottom: 1px solid #1A1E2C;
            font-family: monospace;
        }

        .tx-hash {
            font-family: monospace;
            font-size: 12px;
            color: #8E94B3;
        }

        .tx-amount.positive {
            color: #4CAF50;
        }

        .tx-amount.negative {
            color: #FF6B6B;
        }

        .status-badge {
            background: #1A1E2C;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #8E94B3;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #FF4444;
            padding: 12px 16px;
            margin: 16px 24px;
            border-radius: 8px;
            font-size: 13px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            border-top-color: #05070A;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            padding: 20px 24px;
            background: #0D0F17;
            border-radius: 20px;
            border: 1px solid #1A1E2C;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6C729B;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0D0F17;
        }
        ::-webkit-scrollbar-thumb {
            background: #F7931A;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-section">
            <h1>TAX ESTIMATOR</h1>
            <p>Enterprise Multi-Chain Tax Platform</p>
        </div>
        <div class="version-badge">PRODUCTION • 13 CHAINS</div>
    </div>

    <div class="main-grid">
        <!-- Left Panel: 13 Blockchains with Circle Images -->
        <div class="left-panel">
            <div class="panel-header">SELECT BLOCKCHAIN</div>
            <div class="blockchain-list" id="blockchainList"></div>
        </div>

        <!-- Right Panel: Wallet & Transactions -->
        <div class="right-panel">
            <div class="wallet-section">
                <div class="wallet-label">WALLET BALANCE</div>
                <div class="balance-display">
                    <span class="balance-number" id="balanceValue">0.00000000</span>
                    <span class="balance-symbol" id="balanceSymbol">BTC</span>
                    <span class="balance-usd" id="balanceUSD">$0.00 USD</span>
                </div>
                <div class="address-input-area">
                    <input type="text" class="address-input" id="addressInput" 
                           placeholder="Enter wallet address (BTC, ETH, BSC, etc.)">
                    <button class="fetch-btn" id="fetchBtn">Fetch Balance</button>
                </div>
                <div class="address-note" id="addressNote"></div>
            </div>

            <div class="transactions-section">
                <div class="section-title">
                    <span>📋 RECENT TRANSACTIONS</span>
                    <span class="status-badge" id="txCount">0 transactions</span>
                </div>
                <div id="transactionsContainer">
                    <table class="tx-table" id="txTable">
                        <thead>
                            <tr><th>TX HASH</th><th>DATE</th><th>AMOUNT</th><th>STATUS</th></tr>
                        </thead>
                        <tbody id="txBody">
                            <tr><td colspan="4" style="text-align: center; color: #6C729B;">Enter an address and click Fetch</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <span>🔒 Secure • Real-time blockchain data</span>
        <span id="timestamp"></span>
    </div>
</div>

<script>
    // ============ 13 BLOCKCHAINS WITH LOCAL IMAGES (CIRCLE SHAPE) ============
    const BLOCKCHAINS = [
        { name: "Bitcoin", symbol: "BTC", icon: "/images/btc.png", network: "Bitcoin Mainnet", type: "bitcoin", color: "#F7931A" },
        { name: "Ethereum", symbol: "ETH", icon: "/images/eth.png", network: "Ethereum Mainnet", type: "evm", color: "#627EEA" },
        { name: "Binance Smart Chain", symbol: "BNB", icon: "/images/bnb.png", network: "BSC Mainnet", type: "evm", color: "#F3BA2F" },
        { name: "Solana", symbol: "SOL", icon: "/images/sol.png", network: "Solana Mainnet", type: "solana", color: "#00FFA3" },
        { name: "Polygon", symbol: "MATIC", icon: "/images/poly.png", network: "Polygon PoS", type: "evm", color: "#8247E5" },
        { name: "Avalanche", symbol: "AVAX", icon: "/images/avax.png", network: "Avalanche C-Chain", type: "evm", color: "#E84142" },
        { name: "Arbitrum", symbol: "ETH", icon: "/images/arb.png", network: "Arbitrum One", type: "evm", color: "#28A0F0" },
        { name: "Optimism", symbol: "OP", icon: "/images/op.png", network: "Optimism Mainnet", type: "evm", color: "#FF0420" },
        { name: "Base", symbol: "ETH", icon: "/images/base.png", network: "Base Mainnet", type: "evm", color: "#0052FF" },
        { name: "Fantom", symbol: "FTM", icon: "/images/ftm.png", network: "Fantom Opera", type: "evm", color: "#1969FF" },
        { name: "Cronos", symbol: "CRO", icon: "/images/cro.png", network: "Cronos Mainnet", type: "evm", color: "#0A2C2C" },
        { name: "Gnosis", symbol: "xDAI", icon: "/images/gno.png", network: "Gnosis Chain", type: "evm", color: "#04795B" },
        { name: "Celo", symbol: "CELO", icon: "/images/celo.png", network: "Celo Mainnet", type: "evm", color: "#35D07F" }
    ];

    let currentChain = BLOCKCHAINS[0];
    let currentBalance = null;

    // RPC URLs for EVM chains
    const RPC_URLS = {
        "Ethereum": "https://cloudflare-eth.com",
        "Binance Smart Chain": "https://bsc-dataseed.binance.org",
        "Polygon": "https://polygon-rpc.com",
        "Avalanche": "https://api.avax.network/ext/bc/C/rpc",
        "Arbitrum": "https://arb1.arbitrum.io/rpc",
        "Optimism": "https://mainnet.optimism.io",
        "Base": "https://mainnet.base.org",
        "Fantom": "https://rpc.ftm.tools",
        "Cronos": "https://evm.cronos.org",
        "Gnosis": "https://rpc.gnosischain.com",
        "Celo": "https://forno.celo.org"
    };

    // Bitcoin API (Mempool.space)
    async function fetchBitcoinData(address) {
        const response = await fetch(`https://mempool.space/api/address/${address}`);
        if (!response.ok) throw new Error('Bitcoin address not found');
        const data = await response.json();
        const funded = data.chain_stats?.funded_txo_sum || 0;
        const spent = data.chain_stats?.spent_txo_sum || 0;
        const balanceSat = funded - spent;
        const balanceBTC = balanceSat / 100000000;
        
        const txsResponse = await fetch(`https://mempool.space/api/address/${address}/txs`);
        const txsData = await txsResponse.json();
        const transactions = txsData.slice(0, 10).map(tx => ({
            hash: tx.txid,
            date: new Date(tx.status?.block_time * 1000 || Date.now()).toLocaleDateString(),
            amount: (tx.vout.reduce((sum, out) => sum + out.value, 0) / 100000000).toFixed(8),
            status: tx.status?.confirmed ? 'Confirmed' : 'Pending'
        }));
        
        return { balance: balanceBTC.toFixed(8), transactions };
    }

    // EVM Chain Data
    async function fetchEVMData(chainName, address) {
        const rpcUrl = RPC_URLS[chainName];
        if (!rpcUrl) throw new Error(`No RPC for ${chainName}`);
        
        const balanceResponse = await fetch(rpcUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'eth_getBalance',
                params: [address, 'latest'],
                id: 1
            })
        });
        const balanceData = await balanceResponse.json();
        if (balanceData.error) throw new Error(balanceData.error.message);
        const balanceWei = parseInt(balanceData.result, 16);
        const balanceETH = balanceWei / 1e18;
        
        return { balance: balanceETH.toFixed(8), transactions: [] };
    }

    // Solana API
    async function fetchSolanaData(address) {
        const response = await fetch(`https://api.mainnet-beta.solana.com`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'getBalance',
                params: [address],
                id: 1
            })
        });
        const data = await response.json();
        if (data.error) throw new Error('Solana address not found');
        const balanceSOL = data.result?.value / 1e9 || 0;
        return { balance: balanceSOL.toFixed(6), transactions: [] };
    }

    // Main Fetch Function
    async function fetchWalletData() {
        const address = document.getElementById('addressInput').value.trim();
        if (!address) {
            showError('Please enter a wallet address');
            return;
        }

        setLoading(true);
        
        try {
            let result;
            if (currentChain.type === 'bitcoin') {
                result = await fetchBitcoinData(address);
                document.getElementById('addressNote').innerHTML = `📍 ${address.substring(0, 12)}...${address.substring(address.length - 8)} • ${currentChain.network}`;
            } else if (currentChain.type === 'solana') {
                result = await fetchSolanaData(address);
                document.getElementById('addressNote').innerHTML = `📍 ${address.substring(0, 8)}...${address.substring(address.length - 6)} • ${currentChain.network}`;
            } else {
                result = await fetchEVMData(currentChain.name, address);
                document.getElementById('addressNote').innerHTML = `📍 ${address.substring(0, 10)}...${address.substring(address.length - 6)} • ${currentChain.network}`;
            }
            
            currentBalance = result.balance;
            document.getElementById('balanceValue').innerHTML = parseFloat(result.balance).toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 8 });
            document.getElementById('balanceSymbol').innerHTML = currentChain.symbol;
            
            // USD price from CoinGecko
            try {
                const coinMap = { Bitcoin: 'bitcoin', Ethereum: 'ethereum', Solana: 'solana', Polygon: 'matic-network', Avalanche: 'avalanche-2', Binance: 'binancecoin' };
                const coinId = coinMap[currentChain.name] || currentChain.name.toLowerCase();
                const priceResponse = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${coinId}&vs_currencies=usd`);
                const priceData = await priceResponse.json();
                const price = priceData[coinId]?.usd || 0;
                const usdValue = parseFloat(result.balance) * price;
                document.getElementById('balanceUSD').innerHTML = `$${usdValue.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })} USD`;
            } catch {
                document.getElementById('balanceUSD').innerHTML = `$0.00 USD`;
            }
            
            // Update transaction table
            const txBody = document.getElementById('txBody');
            if (result.transactions && result.transactions.length > 0) {
                txBody.innerHTML = result.transactions.map(tx => `
                    <tr>
                        <td class="tx-hash">${tx.hash.substring(0, 10)}...</td>
                        <td>${tx.date}</td>
                        <td class="${parseFloat(tx.amount) > 0 ? 'positive' : 'negative'}">${tx.amount} ${currentChain.symbol}</td>
                        <td><span class="status-badge">${tx.status}</span></td>
                    </tr>
                `).join('');
                document.getElementById('txCount').innerHTML = `${result.transactions.length} transactions`;
            } else {
                txBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #6C729B;">No recent transactions found</td></tr>';
                document.getElementById('txCount').innerHTML = '0 transactions';
            }
            
        } catch (error) {
            console.error(error);
            showError(`Failed to fetch ${currentChain.name} data: ${error.message}`);
            document.getElementById('txBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: #FF6B6B;">Error fetching data</td></tr>';
        } finally {
            setLoading(false);
        }
    }

    // Render Blockchain List with Circle Images
    function renderBlockchainList() {
        const container = document.getElementById('blockchainList');
        container.innerHTML = BLOCKCHAINS.map(chain => `
            <div class="blockchain-item ${currentChain.name === chain.name ? 'active' : ''}" data-name="${chain.name}" data-symbol="${chain.symbol}" data-icon="${chain.icon}" data-network="${chain.network}" data-type="${chain.type}" data-color="${chain.color}">
                <img class="chain-icon-img" src="${chain.icon}" alt="${chain.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="chain-icon-placeholder" style="background: ${chain.color}20; color: ${chain.color}; display: none;">${chain.name.charAt(0)}</div>
                <div class="chain-info">
                    <div class="chain-name">${chain.name}</div>
                    <div class="chain-network">${chain.network}</div>
                </div>
                <div class="chain-balance-small">${chain.symbol}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.blockchain-item').forEach(el => {
            el.addEventListener('click', () => {
                const chainData = BLOCKCHAINS.find(c => c.name === el.getAttribute('data-name'));
                if (chainData) {
                    currentChain = chainData;
                    renderBlockchainList();
                    document.getElementById('balanceSymbol').innerHTML = chainData.symbol;
                    document.getElementById('balanceValue').innerHTML = '0.00000000';
                    document.getElementById('balanceUSD').innerHTML = '$0.00 USD';
                    document.getElementById('addressNote').innerHTML = '';
                    document.getElementById('addressInput').placeholder = `Enter ${chainData.name} address`;
                    document.getElementById('txBody').innerHTML = '<tr><td colspan="4" style="text-align: center; color: #6C729B;">Select a chain and enter address</td></tr>';
                    document.getElementById('txCount').innerHTML = '0 transactions';
                }
            });
        });
    }

    function showError(msg) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.innerHTML = `⚠️ ${msg}`;
        const rightPanel = document.querySelector('.right-panel');
        rightPanel.insertBefore(errorDiv, rightPanel.firstChild);
        setTimeout(() => errorDiv.remove(), 5000);
    }

    function setLoading(isLoading) {
        const btn = document.getElementById('fetchBtn');
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Fetching...';
        } else {
            btn.disabled = false;
            btn.innerHTML = 'Fetch Balance';
        }
    }

    function updateTimestamp() {
        document.getElementById('timestamp').innerHTML = new Date().toLocaleString();
    }

    // Initialize
    renderBlockchainList();
    document.getElementById('fetchBtn').addEventListener('click', fetchWalletData);
    document.getElementById('addressInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchWalletData();
    });
    updateTimestamp();
    setInterval(updateTimestamp, 1000);
    
    console.log('✅ CryptoTax Enterprise Tax Estimator - 13 Blockchains Ready');
</script>
</body>
</html>
