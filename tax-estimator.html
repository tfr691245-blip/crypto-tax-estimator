<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, view-fit=cover, user-scalable=yes">
    <title>CryptoTax | Professional Tax Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0A0C15;
            --bg-secondary: #0D0F17;
            --bg-card: #0D0F17;
            --bg-input: #05070A;
            --text-primary: #E8EDF5;
            --text-secondary: #8E94B3;
            --text-muted: #6C729B;
            --border-color: #1A1E2C;
            --border-light: rgba(247, 147, 26, 0.15);
            --accent: #F7931A;
            --accent-gradient: linear-gradient(135deg, #F7931A, #FF6B00);
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        .estimator-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="estimator-container">
        <div id="csvModeBtn">CSV Mode</div>
        <div id="walletModeBtn">Wallet Mode</div>
        
        <div id="csvSection">
            </div>

        <div id="walletSection" class="hidden">
            <input type="text" id="addressInput">
            <button id="fetchBtn">Fetch</button>
        </div>

        <div id="taxSummary">
            <span id="txCount">0</span>
        </div>
        <div id="timestamp"></div>
    </div>

    <script>
        (function() {
            const csvBtn = document.getElementById('csvModeBtn');
            const walletBtn = document.getElementById('walletModeBtn');
            const csvDiv = document.getElementById('csvSection');
            const walletDiv = document.getElementById('walletSection');

            function switchMode(mode) {
                if (mode === 'csv') {
                    csvDiv.classList.remove('hidden');
                    walletDiv.classList.add('hidden');
                } else {
                    csvDiv.classList.add('hidden');
                    walletDiv.classList.remove('hidden');
                }
            }

            if(csvBtn) csvBtn.addEventListener('click', () => switchMode('csv'));
            if(walletBtn) walletBtn.addEventListener('click', () => switchMode('wallet'));

            function updateTimestamp() {
                const el = document.getElementById('timestamp');
                if(el) el.innerHTML = new Date().toLocaleString();
            }

            updateTimestamp();
            setInterval(updateTimestamp, 1000);
        })();
    </script>
</body>
</html>
