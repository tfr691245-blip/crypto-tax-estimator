<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoTax | Professional Crypto Tax Estimator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, sans-serif; }
        body { background: radial-gradient(ellipse at top, #0f172a 0%, #1e1b4b 50%, #0a0a1a 100%); background-attachment: fixed; }
        
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border-radius: 28px; border: 1px solid rgba(139, 92, 246, 0.2); transition: all 0.3s ease; }
        
        .btn-primary { 
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); 
            border-radius: 40px; 
            padding: 14px 28px; 
            font-weight: 600; 
            color: white; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5); }
        .btn-primary:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }

        .mode-tab { transition: all 0.3s ease; cursor: pointer; border-radius: 40px; padding: 10px 24px; font-weight: 500; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mode-tab.active { background: linear-gradient(135deg, #8b5cf6, #6366f1); border-color: transparent; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }

        /* FIXED: Network Selector Positioning */
        .network-selector-wrapper { position: relative; z-index: 50; margin-bottom: 24px; }
        .network-trigger { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(139,92,246,0.3); border-radius: 60px; padding: 10px 18px; cursor: pointer; transition: all 0.2s ease; width: fit-content; }
        
        .network-dropdown { 
            position: absolute; 
            top: 100%; 
            left: 0; 
            margin-top: 12px; 
            background: rgba(15,23,42,0.95); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(139,92,246,0.3); 
            border-radius: 24px; 
            padding: 8px; 
            min-width: 280px; 
            z-index: 1000; /* High Z-index to prevent overlap */
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            opacity: 0; 
            visibility: hidden; 
            transform: translateY(-10px); 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .network-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0); }
        
        /* FIXED: Address Input Truncation */
        .address-input { 
            width: 100%; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(139,92,246,0.3); 
            border-radius: 16px; 
            padding: 14px 18px; 
            color: white; 
            font-size: 14px; 
            font-family: monospace; 
            text-overflow: ellipsis; 
            overflow: hidden; 
            white-space: nowrap; 
        }
        .address-input:focus { outline: none; border-color: #8b5cf6; background: rgba(0,0,0,0.5); }

        .tx-row { background: rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 14px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    </style>
</head>
<body class="min-h-screen text-white">

    <div class="container mx-auto px-5 pt-24 pb-16">
        <div class="max-w-4xl mx-auto">
            
            <div class="flex justify-center gap-3 mb-10">
                <div id="csvModeTab" class="mode-tab active">📁 Manual CSV</div>
                <div id="walletModeTab" class="mode-tab">🤖 Auto Wallet</div>
            </div>

            <div id="csvMode" class="glass-card p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold">Upload CSV File</h2>
                    <p class="text-gray-400">Export transaction history from any exchange.</p>
                </div>
                <input type="file" id="csvFile" accept=".csv" class="w-full bg-black/30 border border-purple-500/30 rounded-xl p-4 mb-6 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:bg-purple-600 file:text-white file:border-0">
                <button id="uploadBtn" class="btn-primary w-full"><span>📊</span> Calculate Tax</button>
            </div>

            <div id="walletMode" class="glass-card p-8 hidden">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold">Connect Wallet</h2>
                    <p class="text-gray-400">Real-time on-chain data retrieval.</p>
                </div>
                
                <div class="network-selector-wrapper">
                    <label class="block text-sm text-gray-400 mb-3">Target Blockchain</label>
                    <div id="networkTrigger" class="network-trigger">
                        <img id="selectedNetworkIcon" class="w-7 h-7 rounded-full" src="https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/bnb.png">
                        <span id="selectedNetworkName" class="font-medium">BNB Chain</span>
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </div>
                    
                    <div id="networkDropdown" class="network-dropdown">
                        <div class="network-option flex items-center gap-3 p-3 hover:bg-white/10 rounded-xl cursor-pointer" data-chain="bnb" data-name="BNB Chain" data-icon="...">
                            <img src="..." class="w-7 h-7"> <div>BNB Chain</div>
                        </div>
                        </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm text-gray-400 mb-3">Wallet Address</label>
                    <input type="text" id="walletAddress" class="address-input" placeholder="0x... or ENS name">
                </div>

                <button id="fetchWalletBtn" class="btn-primary w-full"><span>🔍</span> Fetch Balance & Transactions</button>
            </div>

            <div id="results" class="hidden mt-10">
                <div class="glass-card p-6 mb-6">
                    <p class="text-gray-400 text-sm">Estimated Net Gain</p>
                    <h3 id="netGain" class="text-4xl font-extrabold gradient-text">$0.00</h3>
                </div>
                </div>
        </div>
    </div>

    <script>
        // Logic for dropdown and switching modes remains similar, but ensure
        // you add 'results.classList.add('hidden')' whenever a mode is swapped
        // to prevent UI clutter.
    </script>
</body>
</html>
