<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Estimator | CryptoTax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .btn-gradient { background: linear-gradient(135deg, #8b5cf6, #6366f1); }
        .btn-gradient:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-bold text-center mb-2">Tax Estimator</h1>
            <p class="text-center text-gray-400 mb-8">Real mainnet data</p>
            
            <!-- Chain Selector -->
            <div class="glass-card p-6 mb-6">
                <label class="block mb-2 font-medium">Select Blockchain</label>
                <select id="chainSelect" class="w-full bg-black/30 border border-purple-500/30 rounded-xl p-3">
                    <option value="bsc">🟡 BNB Chain (BSC) Mainnet</option>
                    <option value="sol">🟣 Solana Mainnet</option>
                    <option value="eth">🔵 Ethereum Mainnet</option>
                    <option value="btc">🟠 Bitcoin Mainnet</option>
                </select>
            </div>
            
            <!-- Address Input -->
            <div class="glass-card p-6 mb-6">
                <label class="block mb-2 font-medium">Wallet Address</label>
                <input type="text" id="addressInput" class="w-full bg-black/30 border border-purple-500/30 rounded-xl p-3" placeholder="Enter wallet address" value="0xA6AeBFce98456a8d10B2609DbD3609015F80B20a">
            </div>
            
            <!-- Fetch Button -->
            <button id="fetchBtn" class="btn-gradient w-full py-3 rounded-xl font-semibold mb-6 transition-all">🚀 Fetch Balance</button>
            
            <!-- Balance Display -->
            <div id="balanceDisplay" class="glass-card p-6 hidden">
                <h2 class="text-xl font-bold mb-2">💰 Wallet Balance</h2>
                <div class="flex justify-between items-center">
                    <span id="balanceCurrency" class="text-gray-300">Chain</span>
                    <span id="balanceAmount" class="text-3xl font-bold text-purple-400">0</span>
                </div>
                <div id="balanceError" class="text-red-400 text-sm mt-3 hidden"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://tax-api.pyypl2005-4b6.workers.dev';
        
        document.getElementById('fetchBtn').onclick = async () => {
            const address = document.getElementById('addressInput').value.trim();
            const chainSelect = document.getElementById('chainSelect');
            const chain = chainSelect.value;
            const chainText = chainSelect.options[chainSelect.selectedIndex].text;
            
            if (!address) {
                alert('Please enter a wallet address');
                return;
            }
            
            const balanceDiv = document.getElementById('balanceDisplay');
            const balanceAmount = document.getElementById('balanceAmount');
            const balanceCurrency = document.getElementById('balanceCurrency');
            const balanceError = document.getElementById('balanceError');
            
            balanceDiv.classList.remove('hidden');
            balanceError.classList.add('hidden');
            balanceAmount.innerHTML = 'Loading...';
            balanceCurrency.innerHTML = chainText;
            
            let endpoint = '';
            switch(chain) {
                case 'bsc': endpoint = `/api/bnb-balance?address=${address}`; break;
                case 'sol': endpoint = `/api/sol-balance?address=${address}`; break;
                case 'eth': endpoint = `/api/eth-balance?address=${address}`; break;
                case 'btc': endpoint = `/api/btc-balance?address=${address}`; break;
            }
            
            try {
                const response = await fetch(`${API_URL}${endpoint}`);
                const data = await response.json();
                
                if (data.success) {
                    balanceAmount.innerHTML = `${data.balance.toFixed(6)} ${data.nativeToken || chain.toUpperCase()}`;
                } else {
                    balanceError.classList.remove('hidden');
                    balanceError.innerHTML = data.error || 'Failed to fetch balance';
                    balanceAmount.innerHTML = 'Error';
                }
            } catch (err) {
                balanceError.classList.remove('hidden');
                balanceError.innerHTML = err.message;
                balanceAmount.innerHTML = 'Error';
            }
        };
    </script>
</body>
</html>
